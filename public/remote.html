<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<script>(function(){var m=localStorage.getItem('kq-vp')||'mobile';var t=document.createElement('meta');t.name='viewport';t.id='kq-vp';t.content=m==='desktop'?'width=1024,initial-scale=1.0,user-scalable=no':'width=device-width,initial-scale=1.0,user-scalable=no';document.head.appendChild(t);})();</script>
<title>KaraQueue 點歌 🎤</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #0f0f1a; --panel: rgba(255,255,255,0.07); --border: rgba(255,255,255,0.12); --accent: #e94560; --accent2: #7c3aed; --text: #f0f0f0; --muted: #888; }
  body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; min-height: 100vh; }

  .header { padding: 14px 16px 10px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 10; }
  .header h1 { font-size: 18px; font-weight: 700; }
  .header h1 span { color: var(--accent); }
  .nick-input { margin-left: auto; width: 90px; padding: 6px 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--panel); color: var(--text); font-size: 12px; outline: none; }

  .tabs { display: flex; border-bottom: 1px solid var(--border); position: sticky; top: 52px; background: var(--bg); z-index: 9; }
  .tab { flex: 1; padding: 11px; text-align: center; font-size: 13px; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; }
  .tab.active { color: var(--accent); border-color: var(--accent); font-weight: 600; }

  .tab-content { display: none; padding: 14px; }
  .tab-content.active { display: block; }

  .search-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .search-row input { flex: 1; padding: 12px 14px; border: 1px solid var(--border); border-radius: 10px; background: var(--panel); color: var(--text); font-size: 15px; outline: none; }
  .search-row button { padding: 12px 18px; border: none; border-radius: 10px; background: var(--accent); color: #fff; cursor: pointer; font-weight: 600; font-size: 15px; }

  .result-item { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 10px; background: var(--panel); margin-bottom: 8px; border: 1px solid transparent; }
  .result-item img { width: 72px; height: 40px; object-fit: cover; border-radius: 6px; flex-shrink: 0; }
  .result-info { flex: 1; min-width: 0; }
  .result-title { font-size: 13px; font-weight: 500; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .result-author { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .add-btn { flex-shrink: 0; width: 36px; height: 36px; border: none; border-radius: 50%; background: var(--accent); color: #fff; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; transition: background .2s; }
  .add-btn.added { background: #2ecc71; }

  .queue-item { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 10px; background: var(--panel); margin-bottom: 8px; border: 1px solid transparent; }
  .queue-item.active { border-color: var(--accent); background: rgba(233,69,96,0.15); }
  .queue-num { font-size: 13px; color: var(--muted); width: 20px; text-align: center; flex-shrink: 0; }
  .queue-item img { width: 60px; height: 34px; object-fit: cover; border-radius: 4px; flex-shrink: 0; }
  .queue-info { flex: 1; min-width: 0; }
  .queue-title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .queue-by { font-size: 11px; color: var(--muted); }
  .queue-del { flex-shrink: 0; width: 28px; height: 28px; border: none; border-radius: 50%; background: rgba(255,255,255,0.08); color: var(--muted); cursor: pointer; font-size: 16px; }

  .ctrl-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .ctrl-btn { padding: 20px; border: none; border-radius: 14px; background: var(--panel); color: var(--text); cursor: pointer; font-size: 26px; border: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; gap: 6px; transition: all .15s; }
  .ctrl-btn span { font-size: 12px; color: var(--muted); }
  .ctrl-btn:active { transform: scale(.95); }
  .ctrl-btn.danger { background: rgba(233,69,96,0.12); border-color: var(--accent); grid-column: span 2; }

  .now-box { background: var(--panel); border-radius: 12px; padding: 14px 16px; margin-bottom: 14px; border: 1px solid var(--border); }
  .now-label { font-size: 10px; color: var(--muted); margin-bottom: 4px; }
  .now-title { font-size: 15px; font-weight: 600; }
  .next-title { font-size: 12px; color: var(--muted); margin-top: 4px; }

  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #2ecc71; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 600; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 99; white-space: nowrap; }
  .toast.show { opacity: 1; }
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
  .vp-toggle { padding: 5px 9px; border: 1px solid var(--border); border-radius: 8px; background: var(--panel); color: var(--muted); cursor: pointer; font-size: 16px; line-height: 1; -webkit-tap-highlight-color: transparent; }
  .vp-toggle.desktop { border-color: #64b5f6; }
  /* Room switcher */
  .room-sw { position: relative; }
  .room-pill { display: flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 16px; border: 1.5px solid var(--rc,var(--accent)); background: color-mix(in srgb,var(--rc,var(--accent)) 18%,transparent); cursor: pointer; font-size: 11px; font-weight: 600; white-space: nowrap; transition: background .15s; }
  .room-pill .rdot { width: 7px; height: 7px; border-radius: 50%; background: var(--rc,var(--accent)); flex-shrink: 0; }
  .room-dd { position: fixed; top: 56px; left: 10px; right: 10px; background: #1a1a2e; border: 1px solid var(--border); border-radius: 14px; padding: 8px; z-index: 500; display: none; box-shadow: 0 8px 32px rgba(0,0,0,.5); max-height: 70vh; overflow-y: auto; }
  .room-dd.open { display: block; }
  .room-opt { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 9px; cursor: pointer; font-size: 13px; transition: background .12s; }
  .room-opt:hover { background: rgba(255,255,255,.08); }
  .room-opt.active { background: rgba(255,255,255,.12); font-weight: 600; }
  .room-opt .rodot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .room-new-area { border-top: 1px solid var(--border); margin-top: 6px; padding-top: 8px; }
  .room-clr-row { display: flex; gap: 5px; margin-bottom: 6px; }
  .rclr { width: 20px; height: 20px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; flex-shrink: 0; }
  .rclr.sel { border-color: #fff; }
  .room-new-row { display: flex; gap: 6px; }
  .room-new-inp { flex: 1; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; background: rgba(255,255,255,.05); color: var(--text); font-size: 13px; outline: none; min-width: 0; }
  .room-new-inp:focus { border-color: var(--accent); }
  .room-new-btn { padding: 8px 12px; border: none; border-radius: 8px; background: var(--accent); color: #fff; font-size: 13px; cursor: pointer; white-space: nowrap; }
</style>
</head>
<body>

<div class="header">
  <h1>Kara<span>Queue</span> 🎤</h1>
  <div class="room-sw" id="room-sw">
    <div class="room-pill" id="room-pill" onclick="toggleRoomDD(event)">
      <span class="rdot" id="room-dot"></span>
      <span id="room-name-label">預設</span>▾
    </div>
    <div class="room-dd" id="room-dd">
      <div class="room-list" id="room-list"></div>
      <div class="room-new-area">
        <div class="room-clr-row" id="room-clr-row"></div>
        <div class="room-new-row">
          <input class="room-new-inp" id="room-new-inp" placeholder="新房間名稱" onkeydown="if(event.key==='Enter')createNewRoom()" />
          <button class="room-new-btn" onclick="createNewRoom()">＋</button>
        </div>
      </div>
    </div>
  </div>
  <button class="vp-toggle" id="vp-btn" onclick="toggleViewport()" title="切換桌面/手機版">📱</button>
  <input class="nick-input" id="nickname" type="text" placeholder="你嘅名" maxlength="12" />
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('search')">🔍 搜尋</div>
  <div class="tab" onclick="switchTab('queue')">📋 Queue</div>
  <div class="tab" onclick="switchTab('controls')">🎛 控制</div>
</div>

<div class="tab-content active" id="tab-search">
  <div class="search-row">
    <input id="search-input" type="text" placeholder="歌名 / 歌手..." />
    <button id="search-btn">搜</button>
  </div>
  <div id="search-results"></div>
</div>

<div class="tab-content" id="tab-queue">
  <div id="queue-list"><div style="color:var(--muted);text-align:center;padding:30px">Queue 係空嘅</div></div>
</div>

<div class="tab-content" id="tab-controls">
  <div class="now-box">
    <div class="now-label">正在播放</div>
    <div class="now-title" id="now-title">—</div>
    <div class="next-title" id="next-title"></div>
  </div>
  <div class="ctrl-grid">
    <button class="ctrl-btn" onclick="socket.emit('replay')">🔄<span>重播</span></button>
    <button class="ctrl-btn" onclick="socket.emit('next')"><span style="font-size:22px;font-weight:700">停</span><span>跳過呢首</span></button>
    <button class="ctrl-btn" id="lyr-btn" onclick="toggleLyrics()" style="grid-column:span 2">字幕<span id="lyr-status">開啟中</span></button>
    <button class="ctrl-btn danger" onclick="if(confirm('清空Queue？'))socket.emit('clear')">🗑<span>清空 Queue</span></button>
  </div>
  <div style="margin-top:12px;background:var(--panel);border-radius:14px;padding:14px;border:1px solid var(--border)">
    <div style="font-size:12px;color:var(--muted);margin-bottom:10px">字幕時間（全體）</div>
    <div style="display:flex;align-items:center;gap:10px;justify-content:center">
      <button class="ctrl-btn" style="flex:1;padding:14px" onclick="socket.emit('global-lyrics-offset',{delta:-0.5})">◀<span>遲0.5s</span></button>
      <span id="glo-label" style="font-size:15px;color:var(--accent);min-width:44px;text-align:center">0.0s</span>
      <button class="ctrl-btn" style="flex:1;padding:14px" onclick="socket.emit('global-lyrics-offset',{delta:0.5})">▶<span>早0.5s</span></button>
    </div>
  </div>
  <div style="margin-top:16px;background:var(--panel);border-radius:14px;padding:16px;border:1px solid var(--border)">
    <div style="font-size:12px;color:var(--muted);margin-bottom:10px">🔊 音量控制</div>
    <div style="display:flex;align-items:center;gap:10px">
      <span style="font-size:18px">🔈</span>
      <input type="range" id="vol-slider" min="0" max="100" value="100" style="flex:1;accent-color:var(--accent)" oninput="setVol(this.value)" />
      <span style="font-size:18px">🔊</span>
    </div>
    <div style="text-align:center;font-size:13px;color:var(--muted);margin-top:6px" id="vol-label">100%</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
const _roomId = new URLSearchParams(location.search).get('room') || 'default';
socket.on('connect', () => socket.emit('join-room', { roomId: _roomId }));
let queue = [], currentIndex = -1;

const nick = document.getElementById('nickname');
nick.value = localStorage.getItem('kq-nick') || '';
nick.addEventListener('input', () => localStorage.setItem('kq-nick', nick.value));
const getNick = () => nick.value.trim() || 'Guest';

socket.on('state', data => {
  queue = data.queue; currentIndex = data.currentIndex;
  renderQueue();
  updateControls();
  if (currentIndex >= 0 && queue[currentIndex]) {
    syncVolSlider(queue[currentIndex].volume ?? 70);
  }
  const glo = document.getElementById('glo-label');
  if (glo) glo.textContent = ((data.globalLyricsOffset || 0).toFixed(1)) + 's';
  updateLyricsBtn();
});
socket.on('play', data => {
  updateControls();
  if (typeof data === 'object' && data.volume != null) syncVolSlider(data.volume);
  updateLyricsBtn();
});
socket.on('volume', val => syncVolSlider(val));
socket.on('global-lyrics-offset', val => {
  const glo = document.getElementById('glo-label');
  if (glo) glo.textContent = (val || 0).toFixed(1) + 's';
});

function syncVolSlider(val) {
  const s = document.getElementById('vol-slider');
  const l = document.getElementById('vol-label');
  if (s) { s.value = val; l.textContent = val + '%'; }
}

function updateControls() {
  const cur = queue[currentIndex];
  const nxt = queue[currentIndex + 1];
  document.getElementById('now-title').textContent = cur?.title || '—';
  document.getElementById('next-title').textContent = nxt ? `下一首：${nxt.title}` : '';
}

function switchTab(name) {
  ['search','queue','controls'].forEach((n, i) => {
    document.querySelectorAll('.tab')[i].classList.toggle('active', n === name);
    document.getElementById(`tab-${n}`).classList.toggle('active', n === name);
  });
}

// Search
const searchInput = document.getElementById('search-input');
let timer, searchPage = 1, lastSearchQ = '';
searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
document.getElementById('search-btn').onclick = doSearch;
searchInput.addEventListener('input', () => { clearTimeout(timer); timer = setTimeout(doSearch, 700); });

function extractYouTubeId(text) {
  const m = text.match(/(?:youtube\.com\/watch\?(?:.*&)?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : null;
}

async function doSearch() {
  const q = searchInput.value.trim();
  if (!q) return;
  searchPage = 1; lastSearchQ = q;
  document.getElementById('search-btn').textContent = '…';
  try {
    const ytId = extractYouTubeId(q);
    if (ytId) {
      const v = await (await fetch(`/api/video/${ytId}`)).json();
      renderResults([v], false);
    } else {
      const results = await (await fetch(`/api/search?q=${encodeURIComponent(q)}&page=1`)).json();
      renderResults(results, false);
    }
  } catch { renderResults([], false); }
  document.getElementById('search-btn').textContent = '搜';
}

async function loadMore() {
  searchPage++;
  const btn = document.getElementById('load-more-btn');
  if (btn) btn.textContent = '…';
  try {
    const results = await (await fetch(`/api/search?q=${encodeURIComponent(lastSearchQ)}&page=${searchPage}`)).json();
    renderResults(results, true);
  } catch {
    if (btn) btn.textContent = '載入更多';
  }
}

function renderResults(results, append) {
  const c = document.getElementById('search-results');
  const existing = document.getElementById('load-more-btn');
  if (existing) existing.remove();
  if (!append) {
    if (!results.length) { c.innerHTML = '<div style="color:#888;text-align:center;padding:20px">冇結果</div>'; return; }
    c.innerHTML = '';
  }
  if (!results.length && append) return;
  results.forEach(v => {
    const div = document.createElement('div');
    div.className = 'result-item';
    div.innerHTML = `
      <img src="${v.thumbnail}" onerror="this.src='https://i.ytimg.com/vi/${v.videoId}/mqdefault.jpg'" />
      <div class="result-info">
        <div class="result-title">${esc(v.title)}</div>
        <div class="result-author">${esc(v.author)}</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:4px;flex-shrink:0">
        <button class="add-btn" onclick='addVideo(${JSON.stringify(JSON.stringify(v))},this,"add")' title="加到尾">+</button>
        <button class="add-btn" style="background:var(--accent2);font-size:14px" onclick='addVideo(${JSON.stringify(JSON.stringify(v))},this,"next")' title="插入下一首">⚡</button>
      </div>
    `;
    c.appendChild(div);
  });
  if (results.length >= 20) {
    const btn = document.createElement('div');
    btn.id = 'load-more-btn';
    btn.textContent = '載入更多';
    btn.style.cssText = 'text-align:center;padding:14px;color:var(--muted);font-size:13px;cursor:pointer;border:1px solid var(--border);border-radius:10px;margin-top:8px';
    btn.onclick = loadMore;
    c.appendChild(btn);
  }
}

function addVideo(jsonStr, btn, mode) {
  const v = JSON.parse(jsonStr);
  const event = mode === 'next' ? 'add-next' : 'add';
  socket.emit(event, { ...v, addedBy: getNick() });
  btn.textContent = '✓'; btn.classList.add('added');
  setTimeout(() => { btn.textContent = mode === 'next' ? '⚡' : '+'; btn.classList.remove('added'); }, 1500);
  showToast(mode === 'next' ? `插入下一首：${v.title.slice(0,18)}…` : `加到尾：${v.title.slice(0,20)}…`);
}

function renderQueue() {
  const c = document.getElementById('queue-list');
  if (!queue.length) { c.innerHTML = '<div style="color:var(--muted);text-align:center;padding:30px">Queue 係空嘅</div>'; return; }
  let html = '';
  queue.forEach((item, i) => {
    if (currentIndex >= 0 && i < currentIndex) return;
    if (i === currentIndex) {
      html += `
        <div class="queue-item active">
          <span style="font-size:10px;font-weight:700;color:var(--accent);background:rgba(233,69,96,0.18);border:1px solid var(--accent);border-radius:4px;padding:1px 5px;flex-shrink:0;white-space:nowrap">播放中</span>
          <img src="${item.thumbnail}" onerror="this.src='https://i.ytimg.com/vi/${item.videoId}/mqdefault.jpg'" />
          <div class="queue-info">
            <div class="queue-title">${esc(item.title)}</div>
            <div class="queue-by">by ${esc(item.addedBy || 'Guest')}</div>
          </div>
          <div style="display:flex;gap:4px;align-items:center;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end">
            <button class="queue-del" onclick="socket.emit('song-volume',{idx:${i},delta:-10})" style="font-size:14px">🔉</button>
            <span style="font-size:11px;color:var(--muted);min-width:28px;text-align:center">${item.volume??70}%</span>
            <button class="queue-del" onclick="socket.emit('song-volume',{idx:${i},delta:10})" style="font-size:14px">🔊</button>
            <button class="queue-del" onclick="socket.emit('replay')" style="font-size:12px">🔄</button>
            <button class="queue-del" onclick="socket.emit('next')" style="font-size:12px;font-weight:700">停</button>
            <button class="queue-del" onclick="socket.emit('toggle-lyrics')" style="font-size:11px;opacity:${item.lyricsEnabled===false?'0.35':'1'}">字幕</button>
            <button class="queue-del" onclick="socket.emit('lyrics-offset',{idx:${i},delta:-0.5})" style="font-size:10px">◀</button>
            <span style="font-size:10px;color:var(--muted);min-width:26px;text-align:center">${(item.lyricsOffset||0).toFixed(1)}s</span>
            <button class="queue-del" onclick="socket.emit('lyrics-offset',{idx:${i},delta:0.5})" style="font-size:10px">▶</button>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;padding:4px 10px;color:var(--muted);font-size:11px">
          <div style="flex:1;height:1px;background:var(--border)"></div>即將播放<div style="flex:1;height:1px;background:var(--border)"></div>
        </div>
      `;
    } else {
      const num = i - (currentIndex >= 0 ? currentIndex + 1 : 0) + 1;
      html += `
        <div class="queue-item">
          <span class="queue-num">${num}</span>
          <img src="${item.thumbnail}" onerror="this.src='https://i.ytimg.com/vi/${item.videoId}/mqdefault.jpg'" />
          <div class="queue-info">
            <div class="queue-title">${esc(item.title)}</div>
            <div class="queue-by">by ${esc(item.addedBy || 'Guest')}</div>
          </div>
          <div style="display:flex;gap:4px;align-items:center;flex-shrink:0">
            <button class="queue-del" onclick="socket.emit('song-volume',{idx:${i},delta:-10})" style="font-size:14px">🔉</button>
            <span style="font-size:11px;color:var(--muted);min-width:28px;text-align:center">${item.volume??70}%</span>
            <button class="queue-del" onclick="socket.emit('song-volume',{idx:${i},delta:10})" style="font-size:14px">🔊</button>
            <button class="queue-del" onclick="socket.emit('remove',${i})">×</button>
          </div>
        </div>
      `;
    }
  });
  c.innerHTML = html;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function setVol(val) {
  document.getElementById('vol-label').textContent = val + '%';
  socket.emit('volume', Number(val));
}

function toggleLyrics() { socket.emit('toggle-lyrics'); }

function updateLyricsBtn() {
  const btn = document.getElementById('lyr-btn');
  const status = document.getElementById('lyr-status');
  if (!btn || !status) return;
  const song = currentIndex >= 0 ? queue[currentIndex] : null;
  const on = !song || song.lyricsEnabled !== false;
  btn.style.opacity = on ? '1' : '0.4';
  btn.style.borderColor = on ? 'var(--accent)' : '';
  status.textContent = on ? '開啟中' : '已關閉';
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function toggleViewport() {
  var cur = localStorage.getItem('kq-vp') || 'mobile';
  localStorage.setItem('kq-vp', cur === 'mobile' ? 'desktop' : 'mobile');
  location.reload();
}
(function(){ var m = localStorage.getItem('kq-vp') || 'mobile'; var btn = document.getElementById('vp-btn'); if(btn){ btn.textContent = m==='desktop'?'💻':'📱'; btn.classList.toggle('desktop', m==='desktop'); } })();

// ── Room switcher ────────────────────────────────────────────────────
const ROOM_PALETTE = ['#e94560','#7c3aed','#0ea5e9','#10b981','#f59e0b','#ec4899','#06b6d4','#84cc16'];
let currentRoom = { id: 'default', name: '預設房間', color: '#e94560' };
let allRooms = [];
let newRoomColor = ROOM_PALETTE[1];
let roomEditMode = false;

(function initRoomColors() {
  const row = document.getElementById('room-clr-row');
  if (!row) return;
  ROOM_PALETTE.forEach(c => {
    const d = document.createElement('span');
    d.className = 'rclr' + (c === newRoomColor ? ' sel' : '');
    d.style.background = c;
    d.onclick = () => { newRoomColor = c; row.querySelectorAll('.rclr').forEach(x => x.classList.remove('sel')); d.classList.add('sel'); };
    row.appendChild(d);
  });
})();

function updateRoomPill() {
  const pill = document.getElementById('room-pill');
  const dot = document.getElementById('room-dot');
  const label = document.getElementById('room-name-label');
  if (!pill) return;
  pill.style.setProperty('--rc', currentRoom.color);
  if (dot) dot.style.background = currentRoom.color;
  if (label) label.textContent = currentRoom.name.length > 6 ? currentRoom.name.slice(0,6)+'…' : currentRoom.name;
}

async function fetchRooms() {
  try {
    const r = await fetch('/api/rooms');
    allRooms = await r.json();
    renderRoomList();
  } catch {}
}

function renderRoomList() {
  const list = document.getElementById('room-list');
  if (!list) return;
  const editBtn = `<button onclick="roomEditMode=!roomEditMode;renderRoomList()" style="border:none;background:none;color:var(--muted);cursor:pointer;font-size:12px;padding:2px 8px">${roomEditMode ? '完成' : '✏️'}</button>`;
  const header = `<div style="display:flex;align-items:center;justify-content:space-between;padding:2px 4px 8px;border-bottom:1px solid var(--border);margin-bottom:4px"><span style="font-size:12px;color:var(--muted)">房間</span>${editBtn}</div>`;
  const items = allRooms.map(r => {
    const isActive = r.id === currentRoom.id;
    const delBtn = (roomEditMode && r.id !== 'default')
      ? `<button onclick="deleteRoom('${r.id}')" style="width:20px;height:20px;border-radius:50%;border:none;background:#e94560;color:#fff;cursor:pointer;font-size:13px;flex-shrink:0;padding:0;line-height:1;display:flex;align-items:center;justify-content:center">×</button>`
      : `<span class="rodot" style="background:${r.color}"></span>`;
    return `<div class="room-opt${isActive ? ' active' : ''}" onclick="${roomEditMode ? '' : `switchRoom('${r.id}')`}">${delBtn}<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(r.name)}</span>${r.queueLen > 0 ? `<span style="font-size:11px;color:var(--muted)">${r.queueLen}首</span>` : ''}</div>`;
  }).join('');
  list.innerHTML = header + items;
}

async function deleteRoom(id) {
  try {
    await fetch(`/api/rooms/${id}`, { method: 'DELETE' });
    await fetchRooms();
    if (currentRoom.id === id) switchRoom('default');
  } catch {}
}

function toggleRoomDD(e) {
  e.stopPropagation();
  const dd = document.getElementById('room-dd');
  const isOpen = dd.classList.toggle('open');
  if (isOpen) fetchRooms();
}

function switchRoom(id) {
  const r = allRooms.find(x => x.id === id);
  if (!r) return;
  currentRoom = r;
  socket.emit('join-room', { roomId: id });
  updateRoomPill();
  renderRoomList();
  document.getElementById('room-dd').classList.remove('open');
}

async function createNewRoom() {
  const inp = document.getElementById('room-new-inp');
  const name = inp.value.trim() || undefined;
  try {
    const res = await fetch('/api/rooms', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, color: newRoomColor })
    });
    const room = await res.json();
    inp.value = '';
    await fetchRooms();
    switchRoom(room.id);
  } catch {}
}

socket.on('room-info', info => {
  currentRoom = { ...currentRoom, ...info };
  updateRoomPill();
});

document.addEventListener('click', e => {
  const sw = document.getElementById('room-sw');
  if (sw && !sw.contains(e.target)) document.getElementById('room-dd')?.classList.remove('open');
});
</script>
</body>
</html>
