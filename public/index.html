<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1024,initial-scale=1.0,user-scalable=no">
<title>KaraQueue 控制台 🎤</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f1a; --panel: rgba(255,255,255,0.06); --border: rgba(255,255,255,0.1);
    --accent: #e94560; --accent2: #7c3aed; --text: #f0f0f0; --muted: #888;
  }
  body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

  .topbar { display: flex; align-items: center; gap: 12px; padding: 12px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .logo { font-size: 18px; font-weight: 700; }
  .logo span { color: var(--accent); }
  .now-playing { flex: 1; min-width: 0; }
  .now-label { font-size: 10px; color: var(--muted); }
  .now-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ctrl-group { display: flex; gap: 6px; }
  .vp-toggle { padding: 5px 9px; border: 1px solid var(--border); border-radius: 8px; background: var(--panel); color: var(--muted); cursor: pointer; font-size: 16px; line-height: 1; -webkit-tap-highlight-color: transparent; }
  .vp-toggle.desktop { border-color: #64b5f6; }
  .vp-toggle.fullscreen { border-color: var(--accent); color: var(--accent); }
  .ctrl-btn { padding: 8px 14px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; background: var(--panel); color: var(--text); border: 1px solid var(--border); transition: all .15s; }
  .ctrl-btn:hover { background: rgba(255,255,255,0.12); }
  .ctrl-btn.danger:hover { background: rgba(233,69,96,0.3); border-color: var(--accent); }

  .main { display: grid; grid-template-columns: 1fr 340px; flex: 1; overflow: hidden; }

  /* Queue */
  .queue-panel { display: flex; flex-direction: column; border-right: 1px solid var(--border); overflow: hidden; }
  .queue-header { padding: 12px 16px 8px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
  .queue-header span { font-size: 13px; color: var(--muted); }
  .queue-header button { font-size: 11px; padding: 4px 10px; border: 1px solid var(--border); border-radius: 6px; background: none; color: var(--muted); cursor: pointer; }
  .queue-header button:hover { color: var(--accent); border-color: var(--accent); }
  #queue-list { flex: 1; overflow-y: auto; padding: 0 12px 12px; display: flex; flex-direction: column; gap: 6px; }
  .queue-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 8px; background: var(--panel); border: 1px solid transparent; cursor: pointer; transition: all .15s; }
  .queue-item.active { background: rgba(233,69,96,0.18); border-color: var(--accent); cursor: default; }
  .queue-item:hover:not(.active) { background: rgba(255,255,255,0.1); }
  .queue-num { font-size: 12px; color: var(--muted); width: 18px; text-align: center; flex-shrink: 0; }
  .now-badge { font-size: 10px; font-weight: 700; color: var(--accent); background: rgba(233,69,96,0.18); border: 1px solid var(--accent); border-radius: 4px; padding: 1px 5px; flex-shrink: 0; white-space: nowrap; }
  .queue-item img { width: 60px; height: 34px; object-fit: cover; border-radius: 4px; flex-shrink: 0; }
  .queue-info { flex: 1; min-width: 0; }
  .queue-title { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .queue-by { font-size: 10px; color: var(--muted); }
  .queue-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .queue-del { width: 24px; height: 24px; border: none; border-radius: 50%; background: rgba(255,255,255,0.08); color: var(--muted); cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
  .queue-del:hover { background: var(--accent); color: #fff; }
  .queue-act { width: 24px; height: 24px; border: none; border-radius: 50%; background: rgba(255,255,255,0.08); color: var(--muted); cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center; }
  .queue-act:hover { background: rgba(255,255,255,0.18); color: #fff; }
  .queue-divider { display: flex; align-items: center; gap: 8px; padding: 4px 10px; color: var(--muted); font-size: 11px; }
  .queue-divider::before, .queue-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .pinned-divider { height: 1px; background: var(--border); margin: 4px 0; flex-shrink: 0; }
  .next-badge { font-size: 10px; font-weight: 700; color: #64b5f6; background: rgba(100,181,246,0.15); border: 1px solid #64b5f6; border-radius: 4px; padding: 1px 5px; flex-shrink: 0; white-space: nowrap; }
  .queue-empty { text-align: center; color: var(--muted); font-size: 13px; padding: 40px 0; }

  /* Right panel: search + playlist */
  .right-panel { display: flex; flex-direction: column; overflow: hidden; }

  /* Search */
  .search-area { padding: 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .search-row { display: flex; gap: 8px; }
  .search-row input { flex: 1; padding: 10px 14px; border: 1px solid var(--border); border-radius: 10px; background: rgba(255,255,255,0.08); color: var(--text); font-size: 14px; outline: none; }
  .search-row input:focus { border-color: var(--accent); }
  .search-row button { padding: 10px 16px; border: none; border-radius: 10px; background: var(--accent); color: #fff; cursor: pointer; font-weight: 600; }
  #search-results { margin-top: 10px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .result-item { display: flex; align-items: center; gap: 8px; padding: 7px 8px; border-radius: 8px; background: var(--panel); border: 1px solid transparent; cursor: pointer; }
  .result-item:hover { border-color: var(--accent); background: rgba(233,69,96,0.1); }
  .result-item img { width: 64px; height: 36px; object-fit: cover; border-radius: 4px; flex-shrink: 0; }
  .result-info { flex: 1; min-width: 0; }
  .result-title { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .result-author { font-size: 10px; color: var(--muted); }
  .add-btn { flex-shrink: 0; padding: 5px 10px; border: none; border-radius: 6px; background: var(--accent); color: #fff; cursor: pointer; font-size: 12px; font-weight: 600; }

  /* Playlist */
  .playlist-bar { padding: 10px 14px; border-top: 1px solid var(--border); display: flex; gap: 6px; flex-wrap: wrap; flex-shrink: 0; }
  .playlist-bar input { flex: 1; min-width: 80px; padding: 7px 10px; border: 1px solid var(--border); border-radius: 8px; background: rgba(255,255,255,0.07); color: var(--text); font-size: 12px; outline: none; }
  .pl-btn { padding: 7px 12px; border: 1px solid var(--border); border-radius: 8px; background: none; color: var(--text); cursor: pointer; font-size: 12px; white-space: nowrap; }
  .pl-btn:hover { background: var(--accent2); border-color: var(--accent2); color: #fff; }

  /* QR section */
  .qr-section { padding: 12px 14px; border-top: 1px solid var(--border); display: flex; gap: 12px; align-items: center; flex-shrink: 0; }
  .qr-block { text-align: center; cursor: pointer; }
  .qr-block img { width: 56px; height: 56px; background: #fff; padding: 2px; border-radius: 6px; display: block; }
  .qr-block span { font-size: 10px; color: var(--muted); display: block; margin-top: 3px; }
  .qr-info { flex: 1; }
  .qr-info p { font-size: 11px; color: var(--muted); line-height: 1.6; }
  .qr-info code { font-size: 11px; color: var(--accent); }

  /* Modals */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 100; }
  .modal-overlay.open { display: flex; }
  .modal { background: #1a1a2e; border: 1px solid var(--border); border-radius: 16px; padding: 28px; text-align: center; }
  .modal img { width: 200px; height: 200px; background: #fff; padding: 8px; border-radius: 8px; }
  .modal p { margin-top: 10px; font-size: 13px; color: var(--muted); }
  .modal code { display: block; font-size: 12px; color: var(--accent); margin-top: 4px; }
  .modal-close { margin-top: 14px; padding: 9px 22px; border: none; border-radius: 10px; background: var(--accent); color: #fff; cursor: pointer; }
  .pl-modal { background: #1a1a2e; border: 1px solid var(--border); border-radius: 16px; padding: 22px; min-width: 260px; }
  .pl-modal h3 { margin-bottom: 12px; }
  .pl-list { display: flex; flex-direction: column; gap: 8px; max-height: 280px; overflow-y: auto; }
  .pl-list-item { display: flex; align-items: center; justify-content: space-between; padding: 9px 12px; background: var(--panel); border-radius: 8px; border: 1px solid transparent; }
  .pl-list-item:hover { border-color: var(--accent2); }
  .pl-empty { color: var(--muted); font-size: 13px; text-align: center; padding: 20px; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }

  .tab-bar { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .tab-btn { flex: 1; padding: 10px; border: none; border-bottom: 2px solid transparent; background: none; color: var(--muted); cursor: pointer; font-size: 13px; font-weight: 500; transition: all .15s; -webkit-tap-highlight-color: transparent; }
  .tab-btn.active { color: var(--text); border-bottom-color: var(--accent); }
  .tab-btn:hover:not(.active) { color: var(--text); background: rgba(255,255,255,0.04); }
  .filter-row { display: flex; gap: 5px; padding: 8px 12px 0; flex-wrap: wrap; flex-shrink: 0; }
  .fbtn { padding: 4px 10px; border: 1px solid var(--border); border-radius: 16px; background: none; color: var(--muted); cursor: pointer; font-size: 11px; transition: all .15s; -webkit-tap-highlight-color: transparent; }
  .fbtn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .fbtn:hover:not(.active) { border-color: var(--text); color: var(--text); }
  .catalog-item { display: flex; align-items: center; gap: 8px; padding: 7px 8px; border-radius: 8px; background: var(--panel); border: 1px solid transparent; cursor: pointer; }
  .catalog-item:hover { border-color: var(--accent); background: rgba(233,69,96,0.1); }
  .catalog-item img { width: 64px; height: 36px; object-fit: cover; border-radius: 4px; flex-shrink: 0; }
  .catalog-info { flex: 1; min-width: 0; }
  .catalog-title { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .catalog-meta { font-size: 10px; color: var(--muted); }
  .catalog-empty { text-align: center; color: var(--muted); font-size: 13px; padding: 40px 20px; line-height: 1.8; }
  .gender-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 12px 0; }
  .gender-btn { padding: 22px 0; border: 1px solid var(--border); border-radius: 12px; background: var(--panel); color: var(--text); cursor: pointer; font-size: 17px; font-weight: 700; transition: all .15s; -webkit-tap-highlight-color: transparent; }
  .gender-btn:hover { background: rgba(233,69,96,0.18); border-color: var(--accent); color: var(--accent); }
  .singer-grid { display: flex; flex-direction: column; gap: 5px; padding: 4px 0; }
  .singer-btn { padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--panel); color: var(--text); cursor: pointer; font-size: 13px; text-align: left; display: flex; justify-content: space-between; align-items: center; transition: all .15s; -webkit-tap-highlight-color: transparent; }
  .singer-btn:hover { border-color: var(--accent); background: rgba(233,69,96,0.1); }
  .singer-count { font-size: 11px; color: var(--muted); }
  .cat-back { padding: 4px 10px; border: 1px solid var(--border); border-radius: 8px; background: none; color: var(--muted); cursor: pointer; font-size: 12px; flex-shrink: 0; }
  .cat-back:hover { color: var(--text); border-color: var(--text); }

  /* Playlist Manager Modal */
  .pm-modal { background: var(--bg); border: 1px solid var(--border); border-radius: 16px; width: 92vw; max-width: 920px; height: 88vh; display: flex; flex-direction: column; overflow: hidden; }
  .pm-topbar { display: flex; align-items: center; gap: 12px; padding: 14px 18px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .pm-topbar h2 { font-size: 15px; font-weight: 700; }
  .pm-topbar h2 span { color: var(--accent); }
  .pm-close { margin-left: auto; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 22px; line-height: 1; padding: 0 4px; }
  .pm-close:hover { color: var(--text); }
  .pm-layout { display: grid; grid-template-columns: 260px 1fr; flex: 1; overflow: hidden; }
  .pm-sidebar { border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .pm-sidebar-hdr { padding: 12px 14px 8px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
  .pm-sidebar-hdr h3 { font-size: 13px; color: var(--muted); font-weight: 600; }
  .pm-pl-list { flex: 1; overflow-y: auto; padding: 0 10px 10px; display: flex; flex-direction: column; gap: 4px; }
  .pm-pl-item { padding: 10px 12px; border-radius: 8px; background: var(--panel); border: 1px solid transparent; cursor: pointer; transition: all .15s; }
  .pm-pl-item:hover { border-color: var(--border); }
  .pm-pl-item.active { border-color: var(--accent); background: rgba(233,69,96,0.12); }
  .pm-pl-name { font-size: 13px; font-weight: 500; }
  .pm-pl-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .pm-pl-actions { display: flex; gap: 4px; margin-top: 8px; }
  .pm-pl-act { padding: 4px 10px; border: 1px solid var(--border); border-radius: 6px; background: none; color: var(--muted); cursor: pointer; font-size: 11px; }
  .pm-pl-act:hover { color: var(--text); border-color: var(--text); }
  .pm-pl-act.load { background: var(--accent2); border-color: var(--accent2); color: #fff; }
  .pm-pl-act.load:hover { opacity: .85; }
  .pm-pl-act.del:hover { border-color: var(--accent); color: var(--accent); }
  .pm-pl-empty { text-align: center; color: var(--muted); font-size: 12px; padding: 30px 10px; }
  .pm-editor { display: flex; flex-direction: column; overflow: hidden; }
  .pm-editor-empty { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 14px; }
  .pm-editor-hdr { padding: 12px 16px 10px; border-bottom: 1px solid var(--border); display: flex; gap: 10px; align-items: center; flex-shrink: 0; }
  .pm-editor-hdr input { flex: 1; padding: 8px 12px; border: 1px solid var(--border); border-radius: 10px; background: rgba(255,255,255,0.08); color: var(--text); font-size: 14px; font-weight: 600; outline: none; }
  .pm-editor-hdr input:focus { border-color: var(--accent); }
  .pm-hdr-btn { padding: 8px 14px; border: none; border-radius: 10px; cursor: pointer; font-size: 12px; font-weight: 600; white-space: nowrap; }
  .pm-hdr-btn.save { background: var(--panel); color: var(--text); border: 1px solid var(--border); }
  .pm-hdr-btn.save:hover { border-color: var(--accent2); }
  .pm-hdr-btn.loadq { background: var(--accent); color: #fff; }
  .pm-hdr-btn.loadq:hover { opacity: .85; }
  .pm-editor-body { display: grid; grid-template-columns: 1fr 1fr; flex: 1; overflow: hidden; }
  .pm-add-panel { border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .pm-add-hdr { padding: 8px 14px 6px; font-size: 11px; color: var(--muted); font-weight: 600; flex-shrink: 0; }
  .pm-search-row { padding: 0 12px 8px; display: flex; gap: 8px; flex-shrink: 0; }
  .pm-search-row input { flex: 1; padding: 8px 10px; border: 1px solid var(--border); border-radius: 10px; background: rgba(255,255,255,0.07); color: var(--text); font-size: 12px; outline: none; }
  .pm-search-row input:focus { border-color: var(--accent); }
  .pm-search-row button { padding: 8px 14px; border: none; border-radius: 10px; background: var(--accent); color: #fff; cursor: pointer; font-size: 12px; font-weight: 600; }
  .pm-add-results { flex: 1; overflow-y: auto; padding: 0 12px 8px; display: flex; flex-direction: column; gap: 5px; }
  .pm-songs-panel { display: flex; flex-direction: column; overflow: hidden; }
  .pm-songs-hdr { padding: 8px 14px 6px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
  .pm-songs-hdr span { font-size: 11px; color: var(--muted); font-weight: 600; }
  .pm-song-list { flex: 1; overflow-y: auto; padding: 0 12px 8px; display: flex; flex-direction: column; gap: 4px; }
  .pm-pl-locked .pm-pl-name { color: var(--muted); }
  .pm-pl-act.lock { background: none; }
  .pm-pl-act.unlock { background: var(--accent); border-color: var(--accent); color: #fff; }
  .pm-lock-banner { padding: 8px 16px; background: rgba(233,69,96,0.1); border-bottom: 1px solid rgba(233,69,96,0.3); font-size: 12px; color: var(--accent); flex-shrink: 0; display: flex; align-items: center; gap: 8px; }
  .pm-editor-body.locked { grid-template-columns: 1fr; }
  /* Room switcher */
  .room-sw { position: relative; flex-shrink: 0; }
  .room-pill { display: flex; align-items: center; gap: 6px; padding: 5px 11px; border-radius: 20px; border: 1.5px solid var(--rc,var(--accent)); background: color-mix(in srgb,var(--rc,var(--accent)) 18%,transparent); cursor: pointer; font-size: 12px; font-weight: 600; white-space: nowrap; transition: background .15s; user-select: none; }
  .room-pill:hover { background: color-mix(in srgb,var(--rc,var(--accent)) 28%,transparent); }
  .room-pill .rdot { width: 8px; height: 8px; border-radius: 50%; background: var(--rc,var(--accent)); flex-shrink: 0; }
  .room-dd { position: absolute; top: calc(100% + 6px); right: 0; min-width: 220px; background: #1a1a2e; border: 1px solid var(--border); border-radius: 14px; padding: 8px; z-index: 500; display: none; box-shadow: 0 8px 32px rgba(0,0,0,.5); }
  .room-dd.open { display: block; }
  .room-opt { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 9px; cursor: pointer; font-size: 13px; transition: background .12s; }
  .room-opt:hover { background: rgba(255,255,255,.08); }
  .room-opt.active { background: rgba(255,255,255,.12); font-weight: 600; }
  .room-opt .rodot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .room-new-row { display: flex; gap: 6px; border-top: 1px solid var(--border); margin-top: 6px; padding-top: 8px; }
  .room-new-inp { flex: 1; padding: 7px 10px; border: 1px solid var(--border); border-radius: 8px; background: rgba(255,255,255,.05); color: var(--text); font-size: 12px; outline: none; min-width: 0; }
  .room-new-inp:focus { border-color: var(--accent); }
  .room-clr-row { display: flex; gap: 5px; padding: 6px 0 0 0; }
  .rclr { width: 18px; height: 18px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; flex-shrink: 0; transition: border .1s; }
  .rclr.sel { border-color: #fff; }
  .room-new-btn { padding: 7px 11px; border: none; border-radius: 8px; background: var(--accent); color: #fff; font-size: 12px; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
  /* Dropdown for add-to-playlist */
  .atp-wrap { position: relative; flex-shrink: 0; }
  .atp-menu { position: absolute; right: 0; top: calc(100% + 4px); background: #1e1e30; border: 1px solid var(--border); border-radius: 10px; min-width: 160px; z-index: 200; box-shadow: 0 6px 20px rgba(0,0,0,0.5); overflow: hidden; }
  .atp-menu button { display: block; width: 100%; padding: 9px 14px; border: none; background: none; color: var(--text); cursor: pointer; font-size: 12px; text-align: left; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .atp-menu button:hover { background: rgba(255,255,255,0.08); }
  .atp-menu .atp-empty { padding: 10px 14px; color: var(--muted); font-size: 12px; }
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <div class="logo">Kara<span>Queue</span> 🎤</div>
  <div class="now-playing">
    <div class="now-label">正在播放（電視）</div>
    <div class="now-title" id="now-title">—</div>
  </div>
  <div class="ctrl-group">
    <button class="ctrl-btn" onclick="emit('replay')" title="重播">🔄</button>
    <button class="ctrl-btn" onclick="emit('stop')" title="停止">⏹</button>
    <button class="ctrl-btn" onclick="emit('prev')">⏮</button>
    <button class="ctrl-btn" onclick="emit('next')">⏭</button>
    <span style="display:flex;align-items:center;gap:6px;padding:0 4px">
      <span style="font-size:14px">🔊</span>
      <input type="range" id="vol-slider" min="0" max="100" value="70" disabled style="width:90px;opacity:0.45;cursor:default;pointer-events:none" />
      <span id="vol-label" style="font-size:12px;color:var(--muted);width:28px">100</span>
    </span>
    <button class="ctrl-btn" id="auto-classify-btn" onclick="toggleAutoClassify()" title="自動收錄歌庫">🎵</button>
    <button class="ctrl-btn" id="shuffle-btn" onclick="emit('toggle-shuffle')" title="隨機播放">🔀</button>
    <button class="ctrl-btn danger" onclick="confirmClear()">🗑</button>
    <div class="room-sw" id="room-sw">
      <div class="room-pill" id="room-pill" onclick="toggleRoomDD(event)">
        <span class="rdot" id="room-dot"></span>
        <span id="room-name-label">預設房間</span>▾
      </div>
      <div class="room-dd" id="room-dd">
        <div class="room-list" id="room-list"></div>
        <div style="padding:4px 0 0">
          <div class="room-clr-row" id="room-clr-row"></div>
          <div class="room-new-row">
            <input class="room-new-inp" id="room-new-inp" placeholder="新房間名稱（可留空）" onkeydown="if(event.key==='Enter')createNewRoom()" />

<!-- Playlist editor modal -->
<div class="modal-overlay" id="pl-editor-modal">
  <div class="pl-modal" style="width:500px;max-width:92vw;max-height:88vh;display:flex;flex-direction:column;gap:0">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-shrink:0">
      <h3 id="pl-editor-title">📋 歌單</h3>
      <button onclick="closeModal('pl-editor-modal')" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:22px;line-height:1">×</button>
    </div>

      <input id="pl-editor-input" type="text" placeholder="搜尋歌曲或貼上 YouTube 連結..."
        style="flex:1;padding:8px 12px;border:1px solid var(--border);border-radius:8px;background:rgba(255,255,255,0.08);color:var(--text);font-size:13px;outline:none"
        onkeydown="if(event.key==='Enter')plEditorSearch()" />
      <button onclick="plEditorSearch()" style="padding:8px 14px;border:none;border-radius:8px;background:var(--accent);color:#fff;cursor:pointer;font-size:13px">搜</button>
    </div>

    <div id="pl-editor-songs" style="flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:5px;min-height:60px"></div>

      <button onclick="plEditorLoadAll()" style="flex:1;padding:10px;border:none;border-radius:8px;background:var(--accent);color:#fff;cursor:pointer;font-size:13px;font-weight:600">▶ 全部加入隊列</button>
      <button onclick="plEditorSave()" style="padding:10px 16px;border:1px solid var(--border);border-radius:8px;background:none;color:var(--text);cursor:pointer;font-size:13px">💾 儲存</button>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
const _roomId = new URLSearchParams(location.search).get('room') || 'default';
socket.on('connect', () => socket.emit('join-room', { roomId: _roomId }));
let queue = [], currentIndex = -1;

function emit(ev, data) { socket.emit(ev, data); }

socket.on('state', data => {
  queue = data.queue; currentIndex = data.currentIndex;
  renderQueue();
  if (currentIndex >= 0 && queue[currentIndex]) {
    document.getElementById('now-title').textContent = queue[currentIndex].title;
    syncVolSlider(queue[currentIndex].volume ?? 70);
  }
  const shuffleBtn = document.getElementById('shuffle-btn');
  if (shuffleBtn) {
    shuffleBtn.style.borderColor = data.shuffleMode ? 'var(--accent)' : '';
    shuffleBtn.style.color = data.shuffleMode ? 'var(--accent)' : '';
    shuffleBtn.title = data.shuffleMode ? '隨機播放（開啟中，點擊關閉）' : '隨機播放（關閉中，點擊開啟）';
  }
});

socket.on('play', data => {
  if (currentIndex >= 0 && queue[currentIndex]) {
    document.getElementById('now-title').textContent = queue[currentIndex].title;
  }
  if (typeof data === 'object' && data.volume != null) syncVolSlider(data.volume);
});

socket.on('volume', val => syncVolSlider(val));

function syncVolSlider(val) {
  const s = document.getElementById('vol-slider');
  const l = document.getElementById('vol-label');
  if (s) { s.value = val; l.textContent = val; }
}

// Queue
function queueItemHtml(item, i, badge, badgeClass, clickable) {
  const vol = item.volume ?? 70;
  const clickAttr = clickable ? `onclick="emit('play-index', ${i})"` : '';
  const stopProp = clickable ? 'event.stopPropagation();' : '';
  return `
    <div class="queue-item${badge === '播放中' ? ' active' : ''}" ${clickAttr}>
      <span class="${badgeClass}">${badge}</span>
      <img src="${item.thumbnail}" onerror="this.src='https://i.ytimg.com/vi/${item.videoId}/mqdefault.jpg'" />
      <div class="queue-info">
        <div class="queue-title">${esc(item.title)}</div>
        <div class="queue-by">by ${esc(item.addedBy || 'Host')}</div>
      </div>
      <div class="queue-actions">
        <button class="queue-act" onclick="${stopProp}emit('song-volume',{idx:${i},delta:-10})">🔉</button>
        <span style="font-size:11px;color:var(--muted);min-width:28px;text-align:center">${vol}%</span>
        <button class="queue-act" onclick="${stopProp}emit('song-volume',{idx:${i},delta:10})">🔊</button>
        ${badge === '播放中' ? `
          <button class="queue-act" onclick="emit('replay')">🔄</button>
          <button class="queue-act" onclick="emit('skip')">⏭</button>
          <button class="queue-act" onclick="addToCatalog(${i})" title="加入歌庫">📀</button>
        ` : `
          <button class="queue-del" onclick="${stopProp}emit('remove',${i})">×</button>
        `}
      </div>
    </div>`;
}

function renderQueue() {
  const pinned = document.getElementById('queue-pinned');
  const list = document.getElementById('queue-list');
  const upcoming = queue.length - (currentIndex >= 0 ? currentIndex + 1 : 0);
  document.getElementById('queue-count').textContent = `Queue (${upcoming} 首待播)`;

  if (!queue.length) {
    pinned.innerHTML = '';
    list.innerHTML = '<div class="queue-empty">Queue 係空嘅，右邊搜尋加歌！</div>';
    return;
  }

  // Pinned: current + next
  let pinnedHtml = '';
  if (currentIndex >= 0 && queue[currentIndex]) {
    pinnedHtml += queueItemHtml(queue[currentIndex], currentIndex, '播放中', 'now-badge', false);
  }
  const nextIdx = currentIndex >= 0 ? currentIndex + 1 : 0;
  if (queue[nextIdx]) {
    pinnedHtml += `<div class="pinned-divider"></div>`;
    pinnedHtml += queueItemHtml(queue[nextIdx], nextIdx, '下一首', 'next-badge', true);
  }
  if (pinnedHtml) pinnedHtml += `<div class="pinned-divider" style="margin-bottom:8px"></div>`;
  pinned.innerHTML = pinnedHtml;

  // Scrollable: rest from nextIdx+1
  const scrollStart = nextIdx + 1;
  if (scrollStart >= queue.length) {
    list.innerHTML = upcoming <= 1 ? '' : '';
    return;
  }
  let html = '';
  for (let i = scrollStart; i < queue.length; i++) {
    const num = i - (currentIndex >= 0 ? currentIndex + 1 : 0) + 1;
    const item = queue[i];
    const vol = item.volume ?? 70;
    html += `
      <div class="queue-item" onclick="emit('play-index', ${i})">
        <span class="queue-num">${num}</span>
        <img src="${item.thumbnail}" onerror="this.src='https://i.ytimg.com/vi/${item.videoId}/mqdefault.jpg'" />
        <div class="queue-info">
          <div class="queue-title">${esc(item.title)}</div>
          <div class="queue-by">by ${esc(item.addedBy || 'Host')}</div>
        </div>
        <div class="queue-actions">
          <button class="queue-act" onclick="event.stopPropagation();emit('song-volume',{idx:${i},delta:-10})">🔉</button>
          <span style="font-size:11px;color:var(--muted);min-width:28px;text-align:center">${vol}%</span>
          <button class="queue-act" onclick="event.stopPropagation();emit('song-volume',{idx:${i},delta:10})">🔊</button>
          <button class="queue-del" onclick="event.stopPropagation();emit('remove',${i})">×</button>
        </div>
      </div>`;
  }
  list.innerHTML = html;
}

function confirmClear() { if (confirm('清空 Queue？')) emit('clear'); }

// Volume
const volSlider = document.getElementById('vol-slider');
const volLabel = document.getElementById('vol-label');

// Search
const searchInput = document.getElementById('search-input');
let searchTimer, searchPage = 1, lastSearchQ = '';
searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
document.getElementById('search-btn').onclick = doSearch;
searchInput.addEventListener('input', () => { clearTimeout(searchTimer); searchTimer = setTimeout(doSearch, 600); });

function extractYouTubeId(text) {
  const m = text.match(/(?:youtube\.com\/watch\?(?:.*&)?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : null;
}

async function doSearch() {
  const q = searchInput.value.trim();
  if (!q) return;
  searchPage = 1; lastSearchQ = q;
  document.getElementById('search-btn').textContent = '…';
  try {
    const ytId = extractYouTubeId(q);
    if (ytId) {
      const res = await fetch(`/api/video/${ytId}`);
      renderResults([await res.json()], false);
    } else {
      const res = await fetch(`/api/search?q=${encodeURIComponent(q)}&page=1`);
      renderResults(await res.json(), false);
    }
  } catch { renderResults([], false); }
  document.getElementById('search-btn').textContent = '搜';
}

async function loadMore() {
  searchPage++;
  const btn = document.getElementById('load-more-btn');
  if (btn) btn.textContent = '…';
  try {
    const res = await fetch(`/api/search?q=${encodeURIComponent(lastSearchQ)}&page=${searchPage}`);
    renderResults(await res.json(), true);
  } catch {
    if (btn) { btn.textContent = '載入更多'; }
  }
}

function renderResults(results, append) {
  const c = document.getElementById('search-results');
  const existing = document.getElementById('load-more-btn');
  if (existing) existing.remove();
  if (!append) {
    if (!results.length) { c.innerHTML = '<div style="color:#888;font-size:12px;padding:10px">冇結果</div>'; return; }
    c.innerHTML = '';
  }
  if (!results.length && append) return;
  results.forEach(v => {
    const div = document.createElement('div');
    div.className = 'result-item';
    div.innerHTML = `
      <img src="${v.thumbnail}" onerror="this.src='https://i.ytimg.com/vi/${v.videoId}/mqdefault.jpg'" />
      <div class="result-info">
        <div class="result-title">${esc(v.title)}</div>
        <div class="result-author">${esc(v.author)}</div>
      </div>
      <button class="add-btn" onclick='addVideo(${JSON.stringify(JSON.stringify(v))})'>+</button>
      <div class="atp-wrap">
        <button class="add-btn" style="background:var(--accent2);padding:5px 8px" onclick='atpOpen(this,${JSON.stringify(JSON.stringify(v))})' title="加入歌單">📋</button>
        <div class="atp-menu" style="display:none"></div>
      </div>
    `;
    c.appendChild(div);
  });
  if (results.length >= 20) {
    const btn = document.createElement('button');
    btn.id = 'load-more-btn';
    btn.textContent = '載入更多';
    btn.style.cssText = 'width:100%;padding:8px;margin-top:6px;border:1px solid var(--border);border-radius:8px;background:none;color:var(--muted);cursor:pointer;font-size:12px';
    btn.onmouseenter = () => btn.style.color = 'var(--text)';
    btn.onmouseleave = () => btn.style.color = 'var(--muted)';
    btn.onclick = loadMore;
    c.appendChild(btn);
  }
}

function addVideo(jsonStr) {
  emit('add', { ...JSON.parse(jsonStr), addedBy: 'Host' });
}

// Add-to-playlist dropdown
document.addEventListener('click', e => {
  if (!e.target.closest('.atp-wrap')) {
    document.querySelectorAll('.atp-menu').forEach(m => m.style.display = 'none');
  }
});

async function atpOpen(btn, videoJsonStr) {
  const menu = btn.nextElementSibling;
  const isOpen = menu.style.display !== 'none';
  document.querySelectorAll('.atp-menu').forEach(m => m.style.display = 'none');
  if (isOpen) return;
  menu.innerHTML = '<div class="atp-empty">載入中...</div>';
  menu.style.display = 'block';
  const playlists = await (await fetch('/api/playlists')).json();
  const unlocked = playlists.filter(p => !p.locked);
  if (!unlocked.length) {
    menu.innerHTML = '<div class="atp-empty">無可用歌單（全部已鎖定）</div>';
    return;
  }
  menu.innerHTML = '';
  unlocked.forEach(p => {
    const b = document.createElement('button');
    b.textContent = p.name;
    b.onclick = () => atpAddSong(p.name, videoJsonStr, btn);
    menu.appendChild(b);
  });
}

async function atpAddSong(plName, videoJsonStr, triggerBtn) {
  document.querySelectorAll('.atp-menu').forEach(m => m.style.display = 'none');
  const v = JSON.parse(videoJsonStr);
  const res = await fetch(`/api/playlists/${encodeURIComponent(plName)}/add-song`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ ...v, addedBy: 'Host' })
  });
  if (res.ok) {
    triggerBtn.textContent = '✓';
    setTimeout(() => { triggerBtn.textContent = '📋'; }, 1500);
  }
}

// QR
async function loadQR() {
  try {
    const d = await (await fetch('/api/qr')).json();
    document.getElementById('qr-remote').src = d.qrRemote;
    document.getElementById('qr-control').src = d.qrControl;
    document.getElementById('ip-display').textContent = `http://${d.ip}:3000`;
    const tvUrl = `http://localhost:3000/tv`;
    const tvLink = document.getElementById('tv-link');
    tvLink.href = tvUrl;
    tvLink.textContent = tvUrl;
  } catch {}
}
loadQR();

document.getElementById('qr-control-block').onclick = () => showQRModal('qr-control', '控制台（可全螢幕）', `http://${getIP()}:3000`);
document.getElementById('qr-remote-block').onclick = () => showQRModal('qr-remote', '手機搖控', `http://${getIP()}:3000/remote`);

function getIP() { return document.getElementById('ip-display').textContent.replace('http://','').replace(':3000',''); }
function showQRModal(imgId, label, url) {
  document.getElementById('qr-modal-img').src = document.getElementById(imgId).src;
  document.getElementById('qr-modal-label').textContent = label;
  document.getElementById('qr-modal-url').textContent = url;
  document.getElementById('qr-modal').classList.add('open');
}

// Playlists

document.getElementById('pl-load-btn').onclick = async () => {
  const playlists = await (await fetch('/api/playlists')).json();
  const list = document.getElementById('pl-list');
  list.innerHTML = !playlists.length ? '<div class="pl-empty">未有儲存歌單</div>' : playlists.map(p => `
    <div class="pl-list-item">
      <span>${p.locked ? '🔒 ' : ''}${esc(p.name)}</span>
      <button onclick="loadPlaylist('${esc(p.name)}')" style="padding:4px 14px;border:none;border-radius:6px;background:var(--accent2);color:#fff;cursor:pointer;font-size:12px">▶ 載入</button>
    </div>
  `).join('');
  document.getElementById('pl-modal').classList.add('open');
};

async function loadPlaylist(name) {
  const songs = await (await fetch(`/api/playlists/${encodeURIComponent(name)}`)).json();
  songs.forEach(s => emit('add', s));
  closeModal('pl-modal');
}

async function deletePlaylist(name) {
  if (!confirm(`刪除歌單「${name}」？`)) return;
  await fetch(`/api/playlists/${encodeURIComponent(name)}`, { method: 'DELETE' });
  document.getElementById('pl-load-btn').click();
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(m => m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); }));

// Playlist Editor
let plEditorName = '', plEditorSongs = [];

async function openPlEditor(name) {
  plEditorName = name;
  document.getElementById('pl-editor-title').textContent = `📋 ${name}`;
  document.getElementById('pl-editor-results').innerHTML = '';
  document.getElementById('pl-editor-input').value = '';
  try {
    plEditorSongs = await (await fetch(`/api/playlists/${encodeURIComponent(name)}`)).json();
  } catch { plEditorSongs = []; }
  renderPlEditorSongs();
  closeModal('pl-modal');
  document.getElementById('pl-editor-modal').classList.add('open');
}

function renderPlEditorSongs() {
  const c = document.getElementById('pl-editor-songs');
  document.getElementById('pl-editor-count').textContent = `歌單共 ${plEditorSongs.length} 首`;
  if (!plEditorSongs.length) {
    c.innerHTML = '<div style="color:var(--muted);font-size:12px;text-align:center;padding:16px">歌單係空嘅，上面搜尋或貼 YouTube 連結加歌</div>';
    return;
  }
  c.innerHTML = plEditorSongs.map((s, i) => `
    <div style="display:flex;align-items:center;gap:8px;padding:6px 8px;background:var(--panel);border-radius:6px">
      <span style="font-size:11px;color:var(--muted);width:18px;text-align:center;flex-shrink:0">${i+1}</span>
      <img src="${s.thumbnail||`https://i.ytimg.com/vi/${s.videoId}/mqdefault.jpg`}" onerror="this.src='https://i.ytimg.com/vi/${s.videoId}/mqdefault.jpg'" style="width:52px;height:29px;object-fit:cover;border-radius:4px;flex-shrink:0" />
      <div style="flex:1;min-width:0;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(s.title)}</div>
      <button onclick="plEditorAddOne(${i})" title="加入隊列" style="padding:3px 8px;border:none;border-radius:4px;background:var(--accent2);color:#fff;cursor:pointer;font-size:11px;flex-shrink:0">+隊</button>
      <button onclick="plEditorRemove(${i})" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;line-height:1;flex-shrink:0;padding:0 4px">×</button>
    </div>
  `).join('');
}

function plEditorRemove(i) { plEditorSongs.splice(i, 1); renderPlEditorSongs(); }
function plEditorAddOne(i) { emit('add', { ...plEditorSongs[i], addedBy: 'Host' }); }

function plEditorLoadAll() {
  plEditorSongs.forEach(s => emit('add', s));
  closeModal('pl-editor-modal');
}

async function plEditorSave() {
  await fetch(`/api/playlists/${encodeURIComponent(plEditorName)}`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(plEditorSongs)
  });
  alert(`歌單「${plEditorName}」已儲存！`);
}

async function plEditorSearch() {
  const q = document.getElementById('pl-editor-input').value.trim();
  if (!q) return;
  const c = document.getElementById('pl-editor-results');
  c.innerHTML = '<div style="color:var(--muted);font-size:11px;padding:6px">搜尋中...</div>';
  try {
    const ytId = extractYouTubeId(q);
    let results;
    if (ytId) {
      results = [await (await fetch(`/api/video/${ytId}`)).json()];
    } else {
      results = (await (await fetch(`/api/search?q=${encodeURIComponent(q)}&page=1`)).json()).slice(0, 5);
    }
    if (!results.length) { c.innerHTML = '<div style="color:var(--muted);font-size:11px;padding:6px">冇結果</div>'; return; }
    c.innerHTML = '';
    results.forEach(v => {
      const div = document.createElement('div');
      div.style.cssText = 'display:flex;align-items:center;gap:6px;padding:5px 6px;background:var(--panel);border-radius:6px;margin-bottom:4px';
      div.innerHTML = `
        <img src="${v.thumbnail}" onerror="this.src='https://i.ytimg.com/vi/${v.videoId}/mqdefault.jpg'" style="width:52px;height:29px;object-fit:cover;border-radius:3px;flex-shrink:0" />

// Catalog
let catalogDb = [];
const catalogNav = { level: 1, gender: '', singer: '' };

function renderCatalog() {
  const hdr = document.getElementById('catalog-nav-header');
  const c = document.getElementById('catalog-list');

  if (catalogNav.level === 1) {
    hdr.innerHTML = `<span style="font-size:12px;color:var(--muted)">選擇類別</span>`;
    if (!catalogDb.length) {
      c.innerHTML = '<div class="catalog-empty">歌庫暫時係空嘅 🎵<br><br>收錄歌曲有兩個方法：<br><span style="font-size:12px;line-height:2">① 上方 🎵 制開啟自動收錄，唱夠 2 分鐘自動加入<br>② 喺 Queue 入面按 📀 制手動記錄</span><br><br><a href="/settings" style="color:var(--accent);font-size:12px;text-decoration:none;opacity:.8">⚙️ 前往設定了解更多</a></div>';
      return;
    }
    const genderOrder = ['男', '女', '組合', '合唱'];
    const available = genderOrder.filter(g => catalogDb.some(s => s.gender === g));
    const extra = [...new Set(catalogDb.map(s => s.gender))].filter(g => !genderOrder.includes(g));
    const all = [...available, ...extra];
    c.innerHTML = `<div class="gender-grid">${all.map(g => {
      const cnt = catalogDb.filter(s => s.gender === g).length;
      return `<button class="gender-btn" onclick="catalogSelectGender('${g}')">${g}<br><span style="font-size:11px;color:var(--muted);font-weight:400">${cnt} 首</span></button>`;
    }).join('')}</div>`;

  } else if (catalogNav.level === 2) {
    hdr.innerHTML = `<button class="cat-back" onclick="catalogBack()">← 返回</button><span style="font-size:13px;font-weight:600">${catalogNav.gender}</span>`;
    const songs = catalogDb.filter(s => s.gender === catalogNav.gender);
    const singers = [...new Set(songs.map(s => s.singer))].sort((a, b) => a.localeCompare(b, 'zh'));
    c.innerHTML = `<div class="singer-grid">${singers.map(singer => {
      const cnt = songs.filter(s => s.singer === singer).length;
      return `<button class="singer-btn" onclick="catalogSelectSinger('${singer.replace(/'/g,"\\'")}')">
        <span>${esc(singer)}</span>
        <span class="singer-count">${cnt} 首 ›</span>
      </button>`;
    }).join('')}</div>`;

  } else if (catalogNav.level === 3) {
    hdr.innerHTML = `
      <button class="cat-back" onclick="catalogBack()">← 返回</button>
      <span style="font-size:13px;font-weight:600;flex:1">${esc(catalogNav.singer)}</span>
      <button id="catalog-edit-btn" class="fbtn" onclick="toggleCatalogEditMode()">${catalogEditMode ? '✅ 完成' : '✏️ 編輯'}</button>`;
    const songs = [...catalogDb.filter(s => s.singer === catalogNav.singer)]
      .sort((a, b) => (a.title || '').localeCompare(b.title || '', 'zh'));
    if (!songs.length) { c.innerHTML = '<div class="catalog-empty">未有歌曲</div>'; return; }
    c.innerHTML = `<div style="display:flex;flex-direction:column;gap:5px">${songs.map(s => `
      <div class="catalog-item" onclick="addCatalogSong('${s.ytId}')">
        <img src="${s.thumbnail}" onerror="this.src='https://i.ytimg.com/vi/${s.ytId}/mqdefault.jpg'" />
        <div class="catalog-info">
          <div class="catalog-title">${esc(s.title)}</div>
          <div class="catalog-meta">${s.era || ''}</div>
        </div>
        <button class="add-btn" onclick="event.stopPropagation();addCatalogSong('${s.ytId}')">+</button>
        <button class="queue-del catalog-del" style="display:${catalogEditMode?'flex':'none'}" onclick="event.stopPropagation();deleteCatalogSong('${s.ytId}')">×</button>
      </div>`).join('')}</div>`;
  }
}

let catalogEditMode = false;
function toggleCatalogEditMode() {
  catalogEditMode = !catalogEditMode;
  document.querySelectorAll('.catalog-del').forEach(el => el.style.display = catalogEditMode ? 'flex' : 'none');
  const btn = document.getElementById('catalog-edit-btn');
  if (btn) { btn.textContent = catalogEditMode ? '✅ 完成' : '✏️ 編輯'; btn.classList.toggle('active', catalogEditMode); }
}
function catalogSelectGender(g) { catalogNav.gender = g; catalogNav.level = 2; catalogEditMode = false; renderCatalog(); }
function catalogSelectSinger(s) { catalogNav.singer = s; catalogNav.level = 3; catalogEditMode = false; renderCatalog(); }
function catalogBack() { catalogNav.level--; catalogEditMode = false; renderCatalog(); }

async function deleteCatalogSong(ytId) {
  await fetch(`/api/catalog/${ytId}`, { method: 'DELETE' });
  catalogDb = catalogDb.filter(s => s.ytId !== ytId);
  renderCatalog();
}

function addCatalogSong(ytId) {
  const s = catalogDb.find(s => s.ytId === ytId);
  if (!s) return;
  emit('add', { videoId: s.ytId, title: s.title, author: s.singer, thumbnail: s.thumbnail, duration: 0, volume: s.volume, addedBy: 'Host' });
}

let hasApiKey = false;
let manualSong = null;

async function addToCatalog(idx) {
  const song = queue[idx];
  if (!song) return;
  const btn = event.target;
  btn.textContent = '⏳'; btn.disabled = true;
  try {
    const d = await fetch('/api/catalog/add', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ videoId: song.videoId, title: song.title, author: song.author, thumbnail: song.thumbnail })
    }).then(r => r.json());
    if (d.needManual) {
      btn.textContent = '📀'; btn.disabled = false;
      openManualModal(song);
      return;
    }
    btn.textContent = '✅';
  } catch { btn.textContent = '❌'; }
  setTimeout(() => { btn.textContent = '📀'; btn.disabled = false; }, 2000);
}

function openManualModal(song) {
  manualSong = song;
  document.getElementById('manual-title').value = song.title || '';
  document.getElementById('manual-singer').value = '';
  document.getElementById('manual-gender').value = '男';
  document.getElementById('manual-lang').value = '廣東話';
  document.getElementById('manual-era').value = '未知';
  document.getElementById('manual-msg').textContent = '';
  document.getElementById('manual-modal').classList.add('open');
  setTimeout(() => document.getElementById('manual-singer').focus(), 100);
}

async function submitManual() {
  if (!manualSong) return;
  const singer = document.getElementById('manual-singer').value.trim();
  if (!singer) { document.getElementById('manual-msg').textContent = '請填寫歌手名'; return; }
  const btn = document.getElementById('manual-submit-btn');
  btn.disabled = true; btn.textContent = '儲存中…';
  try {
    const d = await fetch('/api/catalog/manual-add', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        videoId: manualSong.videoId,
        title: document.getElementById('manual-title').value,
        singer,
        gender: document.getElementById('manual-gender').value,
        language: document.getElementById('manual-lang').value,
        era: document.getElementById('manual-era').value,
        thumbnail: manualSong.thumbnail
      })
    }).then(r => r.json());
    if (d.ok) {
      document.getElementById('manual-modal').classList.remove('open');
      manualSong = null;
    } else {
      document.getElementById('manual-msg').textContent = '儲存失敗';
    }
  } catch { document.getElementById('manual-msg').textContent = '連線錯誤'; }
  btn.disabled = false; btn.textContent = '加入歌庫';
}

function toggleFullscreen() {
  var el = document.documentElement;
  var fsEl = document.fullscreenElement || document.webkitFullscreenElement;
  if (!fsEl) {
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  } else {
    if (document.exitFullscreen) document.exitFullscreen();
    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
  }
}
function updateFsBtn() {
  var btn = document.getElementById('fs-btn');

}

// ── Room switcher ────────────────────────────────────────────────────
const ROOM_PALETTE = ['#e94560','#7c3aed','#0ea5e9','#10b981','#f59e0b','#ec4899','#06b6d4','#84cc16'];
let currentRoom = { id: 'default', name: '預設房間', color: '#e94560' };
let allRooms = [];
let newRoomColor = ROOM_PALETTE[1];
let roomEditMode = false;

(function initRoomColors() {
  const row = document.getElementById('room-clr-row');
  if (!row) return;
  ROOM_PALETTE.forEach(c => {
    const d = document.createElement('span');
    d.className = 'rclr' + (c === newRoomColor ? ' sel' : '');
    d.style.background = c;
    d.title = c;
    d.onclick = () => {
      newRoomColor = c;
      row.querySelectorAll('.rclr').forEach(x => x.classList.remove('sel'));
      d.classList.add('sel');
    };
    row.appendChild(d);
  });
})();

function updateRoomPill() {
  const pill = document.getElementById('room-pill');
  const dot = document.getElementById('room-dot');
  const label = document.getElementById('room-name-label');
  if (!pill) return;
  pill.style.setProperty('--rc', currentRoom.color);
  if (dot) dot.style.background = currentRoom.color;
  if (label) label.textContent = currentRoom.name;
}

async function fetchRooms() {
  try {
    const r = await fetch('/api/rooms');
    allRooms = await r.json();
    renderRoomList();
  } catch {}
}

function renderRoomList() {
  const list = document.getElementById('room-list');
  if (!list) return;
  const editBtn = `<button onclick="roomEditMode=!roomEditMode;renderRoomList()" style="border:none;background:none;color:var(--muted);cursor:pointer;font-size:12px;padding:2px 8px">${roomEditMode ? '完成' : '✏️'}</button>`;
  const header = `<div style="display:flex;align-items:center;justify-content:space-between;padding:2px 4px 8px;border-bottom:1px solid var(--border);margin-bottom:4px"><span style="font-size:12px;color:var(--muted)">房間</span>${editBtn}</div>`;
  const items = allRooms.map(r => {
    const isActive = r.id === currentRoom.id;
    const delBtn = (roomEditMode && r.id !== 'default')
      ? `<button onclick="deleteRoom('${r.id}')" style="width:20px;height:20px;border-radius:50%;border:none;background:#e94560;color:#fff;cursor:pointer;font-size:13px;flex-shrink:0;padding:0;line-height:1;display:flex;align-items:center;justify-content:center">×</button>`
      : `<span class="rodot" style="background:${r.color}"></span>`;
    return `<div class="room-opt${isActive ? ' active' : ''}" onclick="${roomEditMode ? '' : `switchRoom('${r.id}')`}">${delBtn}<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(r.name)}</span>${r.queueLen > 0 ? `<span style="font-size:11px;color:var(--muted)">${r.queueLen}首</span>` : ''}</div>`;
  }).join('');
  list.innerHTML = header + items;
}

async function deleteRoom(id) {
  try {
    await fetch(`/api/rooms/${id}`, { method: 'DELETE' });
    await fetchRooms();
    if (currentRoom.id === id) switchRoom('default');
  } catch {}
}

function toggleRoomDD(e) {
  e.stopPropagation();
  const dd = document.getElementById('room-dd');
  const isOpen = dd.classList.toggle('open');
  if (isOpen) fetchRooms();
}

function switchRoom(id) {
  const r = allRooms.find(x => x.id === id);
  if (!r) return;
  currentRoom = r;
  socket.emit('join-room', { roomId: id });
  updateRoomPill();
  renderRoomList();
  document.getElementById('room-dd').classList.remove('open');
}

async function createNewRoom() {
  const inp = document.getElementById('room-new-inp');
  const name = inp.value.trim() || undefined;
  try {
    const res = await fetch('/api/rooms', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, color: newRoomColor })
    });
    const room = await res.json();
    inp.value = '';
    await fetchRooms();
    switchRoom(room.id);
  } catch {}
}

socket.on('room-info', info => {
  currentRoom = { ...currentRoom, ...info };
  updateRoomPill();
});

document.addEventListener('click', e => {
  const sw = document.getElementById('room-sw');
  if (sw && !sw.contains(e.target)) document.getElementById('room-dd')?.classList.remove('open');
});

// Playlist Manager
let pmCurrentName = null, pmCurrentSongs = [], pmIsLocked = false;

function openPM() {
  document.getElementById('pm-modal').classList.add('open');
  pmLoadList();
}
function closePM() {
  document.getElementById('pm-modal').classList.remove('open');
}

async function pmLoadList() {
  const playlists = await (await fetch('/api/playlists')).json();
  const c = document.getElementById('pm-pl-list');
  if (!playlists.length) { c.innerHTML = '<div class="pm-pl-empty">尚未有歌單，按「新增」建立</div>'; return; }
  c.innerHTML = playlists.map(p => `
    <div class="pm-pl-item${p.locked ? ' pm-pl-locked' : ''}" id="pm-plitem-${CSS.escape(p.name)}" onclick="pmOpenPl('${esc(p.name)}', ${p.locked})">
      <div class="pm-pl-name">${p.locked ? '🔒 ' : ''}${esc(p.name)}</div>
      <div class="pm-pl-meta" id="pm-meta-${esc(p.name)}">載入中...</div>
      <div class="pm-pl-actions" onclick="event.stopPropagation()">
        <button class="pm-pl-act load" onclick="pmQuickLoad('${esc(p.name)}')">▶ 載入</button>
        <button class="pm-pl-act ${p.locked ? 'unlock' : 'lock'}" onclick="pmToggleLock('${esc(p.name)}')" title="${p.locked ? '解鎖' : '鎖定'}">${p.locked ? '🔓' : '🔒'}</button>
        ${!p.locked ? `<button class="pm-pl-act del" onclick="pmDeletePl('${esc(p.name)}')">🗑</button>` : ''}
      </div>
    </div>
  `).join('');
  playlists.forEach(async p => {
    try {
      const songs = await (await fetch(`/api/playlists/${encodeURIComponent(p.name)}`)).json();
      const el = document.getElementById(`pm-meta-${esc(p.name)}`);
      if (el) el.textContent = `${songs.length} 首歌`;
    } catch {}
  });
}

async function pmToggleLock(name) {
  const res = await fetch(`/api/playlists/${encodeURIComponent(name)}/lock`, { method: 'PATCH' });
  if (!res.ok) return;
  const d = await res.json();
  if (pmCurrentName === name) {
    pmIsLocked = d.locked;
    pmUpdateLockUI();
  }
  pmLoadList();
}

function pmCreateNew() {
  pmCurrentName = '';
  pmCurrentSongs = [];
  document.getElementById('pm-name').value = '';
  document.getElementById('pm-add-input').value = '';
  document.getElementById('pm-add-results').innerHTML = '';
  pmRenderSongs();
  pmShowEditor();
  document.querySelectorAll('.pm-pl-item').forEach(el => el.classList.remove('active'));
  document.getElementById('pm-name').focus();
}

async function pmOpenPl(name, locked) {
  pmCurrentName = name;
  pmIsLocked = !!locked;
  document.getElementById('pm-name').value = name;
  document.getElementById('pm-name').readOnly = pmIsLocked;
  document.getElementById('pm-add-input').value = '';
  document.getElementById('pm-add-results').innerHTML = '';
  try {
    pmCurrentSongs = await (await fetch(`/api/playlists/${encodeURIComponent(name)}`)).json();
  } catch { pmCurrentSongs = []; }
  pmRenderSongs();
  pmShowEditor();
  pmUpdateLockUI();
  document.querySelectorAll('.pm-pl-item').forEach(el => el.classList.remove('active'));
  const item = document.getElementById(`pm-plitem-${CSS.escape(name)}`);
  if (item) item.classList.add('active');
}

function pmUpdateLockUI() {
  const banner = document.getElementById('pm-lock-banner');
  const addPanel = document.querySelector('.pm-add-panel');
  const editorBody = document.querySelector('.pm-editor-body');
  const saveBtn = document.getElementById('pm-save-btn');
  const exportBtn = document.getElementById('pm-export-btn');
  if (banner) banner.style.display = pmIsLocked ? 'flex' : 'none';
  if (addPanel) addPanel.style.display = pmIsLocked ? 'none' : 'flex';
  if (editorBody) editorBody.classList.toggle('locked', pmIsLocked);
  if (saveBtn) saveBtn.style.display = pmIsLocked ? 'none' : '';
  if (exportBtn) exportBtn.style.display = pmIsLocked ? '' : '';
}

function pmShowEditor() {
  document.getElementById('pm-editor-empty').style.display = 'none';
  document.getElementById('pm-editor-main').style.display = 'flex';
}

function pmRenderSongs() {
  const c = document.getElementById('pm-song-list');
  document.getElementById('pm-songs-count').textContent = `歌單共 ${pmCurrentSongs.length} 首`;
  if (!pmCurrentSongs.length) {
    c.innerHTML = '<div style="color:var(--muted);font-size:12px;text-align:center;padding:20px">歌單係空嘅，左邊搜尋加歌</div>';
    return;
  }
  c.innerHTML = pmCurrentSongs.map((s, i) => `
    <div style="display:flex;align-items:center;gap:7px;padding:5px 7px;border-radius:7px;background:var(--panel)">
      <span style="font-size:11px;color:var(--muted);width:18px;text-align:center;flex-shrink:0">${i+1}</span>
      <img src="${s.thumbnail||`https://i.ytimg.com/vi/${s.videoId}/mqdefault.jpg`}" onerror="this.src='https://i.ytimg.com/vi/${s.videoId}/mqdefault.jpg'" style="width:50px;height:28px;object-fit:cover;border-radius:4px;flex-shrink:0" />
      <div style="flex:1;min-width:0">
        <div style="font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(s.title)}</div>
        <div style="font-size:10px;color:var(--muted)">${esc(s.author||'')}</div>
      </div>
      <button onclick="pmAddOneToQueue(${i})" style="padding:3px 7px;border:none;border-radius:4px;background:var(--accent2);color:#fff;cursor:pointer;font-size:11px;flex-shrink:0">+隊</button>
      ${!pmIsLocked ? `<button onclick="pmRemoveSong(${i})" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:17px;line-height:1;flex-shrink:0;padding:0 3px">×</button>` : ''}
    </div>
  `).join('');
}

function pmRemoveSong(i) { pmCurrentSongs.splice(i, 1); pmRenderSongs(); }
function pmAddOneToQueue(i) { emit('add', { ...pmCurrentSongs[i], addedBy: 'Playlist' }); }

function pmAddAllToQueue() {
  if (!pmCurrentSongs.length) return;
  pmCurrentSongs.forEach(s => emit('add', { ...s, addedBy: 'Playlist' }));
}

function pmLoadToQueue() { pmAddAllToQueue(); }

async function pmSavePl() {
  const name = document.getElementById('pm-name').value.trim();
  if (!name) { alert('請輸入歌單名稱'); return; }
  await fetch(`/api/playlists/${encodeURIComponent(name)}`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(pmCurrentSongs)
  });
  pmCurrentName = name;
  pmLoadList();
}

async function pmQuickLoad(name) {
  const songs = await (await fetch(`/api/playlists/${encodeURIComponent(name)}`)).json();
  songs.forEach(s => emit('add', { ...s, addedBy: 'Playlist' }));
}

async function pmDeletePl(name) {
  if (!confirm(`刪除歌單「${name}」？`)) return;
  await fetch(`/api/playlists/${encodeURIComponent(name)}`, { method: 'DELETE' });
  if (pmCurrentName === name) {
    pmCurrentName = null;
    pmCurrentSongs = [];
    document.getElementById('pm-editor-empty').style.display = 'flex';
    document.getElementById('pm-editor-main').style.display = 'none';
  }
  pmLoadList();
}

async function pmDoSearch() {
  const q = document.getElementById('pm-add-input').value.trim();
  if (!q) return;
  const c = document.getElementById('pm-add-results');
  c.innerHTML = '<div style="color:var(--muted);font-size:12px;padding:8px">搜尋中...</div>';
  try {
    const ytId = extractYouTubeId(q);
    let results;
    if (ytId) {
      results = [await (await fetch(`/api/video/${ytId}`)).json()];
    } else {
      results = await (await fetch(`/api/search?q=${encodeURIComponent(q)}&page=1`)).json();
    }
    if (!results.length) { c.innerHTML = '<div style="color:var(--muted);font-size:12px;padding:8px">冇結果</div>'; return; }
    c.innerHTML = '';
    results.forEach(v => {
      const div = document.createElement('div');
      div.style.cssText = 'display:flex;align-items:center;gap:7px;padding:6px 7px;border-radius:7px;background:var(--panel)';
      div.innerHTML = `
        <img src="${v.thumbnail}" onerror="this.src='https://i.ytimg.com/vi/${v.videoId}/mqdefault.jpg'" style="width:56px;height:32px;object-fit:cover;border-radius:4px;flex-shrink:0" />
        <div style="flex:1;min-width:0">
          <div style="font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(v.title)}</div>
          <div style="font-size:10px;color:var(--muted)">${esc(v.author||'')}</div>
        </div>
        <button onclick='pmAddToCurrentPl(${JSON.stringify(JSON.stringify(v))},this)' style="padding:4px 9px;border:none;border-radius:6px;background:var(--accent);color:#fff;cursor:pointer;font-size:12px;font-weight:600;flex-shrink:0">+</button>
      `;
      c.appendChild(div);
    });
  } catch { c.innerHTML = '<div style="color:var(--muted);font-size:12px;padding:8px">搜尋失敗</div>'; }
}

function pmExport() {
  if (!pmCurrentSongs.length && !pmCurrentName) return;
  const name = document.getElementById('pm-name').value.trim() || pmCurrentName || 'playlist';
  const blob = new Blob([JSON.stringify(pmCurrentSongs, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `${name}.json`; a.click();
  URL.revokeObjectURL(url);
}

function pmTriggerImport() {
  document.getElementById('pm-import-input').value = '';
  document.getElementById('pm-import-input').click();
}

function pmImport(input) {
  const file = input.files[0];
  if (!file) return;
  const defaultName = file.name.replace(/\.json$/i, '');
  const reader = new FileReader();
  reader.onload = async e => {
    let songs;
    try { songs = JSON.parse(e.target.result); } catch { alert('檔案格式錯誤，請選擇有效嘅 JSON 檔案'); return; }
    if (!Array.isArray(songs)) { alert('檔案格式錯誤：預期係歌曲陣列'); return; }
    const name = prompt('歌單名稱：', defaultName);
    if (!name || !name.trim()) return;
    await fetch(`/api/playlists/${encodeURIComponent(name.trim())}`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(songs)
    });
    pmLoadList();
    pmOpenPl(name.trim());
  };
  reader.readAsText(file);
}

function pmAddToCurrentPl(jsonStr, btn) {
  const v = JSON.parse(jsonStr);
  pmCurrentSongs.push({ ...v, addedBy: 'Playlist' });
  pmRenderSongs();
  btn.textContent = '✓';
  setTimeout(() => { btn.textContent = '+'; }, 1500);
}
</script>

<!-- Playlist Manager Modal -->
<div class="modal-overlay" id="pm-modal">
  <div class="pm-modal">
    <div class="pm-topbar">
      <h2>Kara<span>Queue</span> 🎤 歌單管理</h2>
      <button class="pm-close" onclick="closePM()">×</button>
    </div>
    <div class="pm-layout">
      <div class="pm-sidebar">
        <div class="pm-sidebar-hdr">
          <h3>所有歌單</h3>
          <div style="display:flex;gap:5px">
            <button class="new-btn" onclick="pmCreateNew()">+ 新增</button>
            <button class="new-btn" onclick="pmTriggerImport()" style="background:var(--accent2)" title="從 JSON 檔案匯入歌單">📥</button>
          </div>
        </div>
        <input type="file" id="pm-import-input" accept=".json" style="display:none" onchange="pmImport(this)" />
        <div class="pm-pl-list" id="pm-pl-list">
          <div class="pm-pl-empty">載入中...</div>
        </div>
      </div>
      <div class="pm-editor">
        <div class="pm-editor-empty" id="pm-editor-empty">← 選擇或新增歌單開始編輯</div>
        <div id="pm-editor-main" style="display:none;flex:1;flex-direction:column;overflow:hidden">
          <div class="pm-lock-banner" id="pm-lock-banner" style="display:none">🔒 呢個歌單已鎖定，唔可以修改。喺左邊按 🔓 解鎖。</div>
          <div class="pm-editor-hdr">
            <input id="pm-name" type="text" placeholder="歌單名稱..." />
            <button id="pm-save-btn" class="pm-hdr-btn save" onclick="pmSavePl()">💾 儲存</button>
            <button id="pm-export-btn" class="pm-hdr-btn save" onclick="pmExport()" title="匯出為 JSON 檔案">📤 匯出</button>
            <button class="pm-hdr-btn loadq" onclick="pmLoadToQueue()">▶ 載入隊列</button>
          </div>
          <div class="pm-editor-body">
            <div class="pm-add-panel">
              <div class="pm-add-hdr">搜尋 / 新增歌曲</div>
              <div class="pm-search-row">
                <input id="pm-add-input" type="text" placeholder="歌名、歌手或 YouTube 連結..." onkeydown="if(event.key==='Enter')pmDoSearch()" />
                <button onclick="pmDoSearch()">搜</button>
              </div>
              <div class="pm-add-results" id="pm-add-results"></div>
            </div>
            <div class="pm-songs-panel">
              <div class="pm-songs-hdr">
                <span id="pm-songs-count">歌單內容</span>
                <button onclick="pmAddAllToQueue()" style="padding:3px 8px;border:none;border-radius:6px;background:var(--accent);color:#fff;cursor:pointer;font-size:11px">全加隊列</button>
              </div>
              <div class="pm-song-list" id="pm-song-list"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Manual classify modal -->
<div class="modal-overlay" id="manual-modal" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="pl-modal" style="min-width:300px;max-width:360px">
    <h3 style="margin-bottom:14px;font-size:15px">📀 加入歌庫</h3>
    <div style="display:flex;flex-direction:column;gap:10px">
      <div>
        <label style="font-size:11px;color:var(--muted);display:block;margin-bottom:4px">歌曲標題</label>
        <input id="manual-title" type="text" style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:8px;background:rgba(255,255,255,0.07);color:var(--text);font-size:13px;outline:none" readonly />
      </div>
      <div>
        <label style="font-size:11px;color:var(--muted);display:block;margin-bottom:4px">歌手名 <span style="color:var(--accent)">*</span></label>
        <input id="manual-singer" type="text" placeholder="例：古巨基" style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:8px;background:rgba(255,255,255,0.07);color:var(--text);font-size:13px;outline:none" />
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
        <div>
          <label style="font-size:11px;color:var(--muted);display:block;margin-bottom:4px">性別</label>
          <select id="manual-gender" style="width:100%;padding:7px 6px;border:1px solid var(--border);border-radius:8px;background:#1a1a2e;color:var(--text);font-size:12px;outline:none">
            <option>男</option><option>女</option><option>組合</option><option>合唱</option>
          </select>
        </div>
        <div>
          <label style="font-size:11px;color:var(--muted);display:block;margin-bottom:4px">語言</label>
          <select id="manual-lang" style="width:100%;padding:7px 6px;border:1px solid var(--border);border-radius:8px;background:#1a1a2e;color:var(--text);font-size:12px;outline:none">
            <option>廣東話</option><option>普通話</option><option>英文</option><option>日文</option><option>其他</option>
          </select>
        </div>
        <div>
          <label style="font-size:11px;color:var(--muted);display:block;margin-bottom:4px">年代</label>
          <select id="manual-era" style="width:100%;padding:7px 6px;border:1px solid var(--border);border-radius:8px;background:#1a1a2e;color:var(--text);font-size:12px;outline:none">
            <option>未知</option><option>70年代</option><option>80年代</option><option>90年代</option><option>00年代</option><option>10年代</option><option>20年代</option>
          </select>
        </div>
      </div>
      <div style="font-size:12px;color:var(--accent);min-height:18px" id="manual-msg"></div>
    </div>
    <div style="display:flex;gap:8px;margin-top:16px;justify-content:flex-end">
      <button class="pl-btn" onclick="document.getElementById('manual-modal').classList.remove('open')">取消</button>
      <button id="manual-submit-btn" class="pl-btn" onclick="submitManual()" style="background:var(--accent);border-color:var(--accent);color:#fff">加入歌庫</button>
    </div>
  </div>
</div>
</body>
