<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>KaraQueue TV</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; width: 100vw; height: 100vh; overflow: hidden; }
  #player { width: 100%; height: 100%; }
  #overlay {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
    background: linear-gradient(135deg, #0f0f1a, #1a1a2e);
    color: #fff; transition: opacity .8s;
  }
  #overlay.hidden { opacity: 0; pointer-events: none; }
  #overlay .icon { font-size: 80px; }
  #overlay h1 { font-size: 36px; font-family: system-ui; }
  #overlay h1 span { color: #e94560; }
  #overlay p { color: #888; font-size: 16px; font-family: system-ui; }
  #now-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 14px 28px; background: linear-gradient(transparent, rgba(0,0,0,0.85));
    color: #fff; font-family: system-ui; display: flex; align-items: center; gap: 16px;
    opacity: 0; transition: opacity .5s; pointer-events: none;
  }
  #now-bar.show { opacity: 1; }
  #now-bar .label { font-size: 12px; color: #aaa; }
  #now-bar .title { font-size: 18px; font-weight: 600; }
  #now-bar .next { margin-left: auto; font-size: 13px; color: #aaa; max-width: 300px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Lyrics overlay */
  #lyrics-panel {
    position: fixed; bottom: 72px; left: 0; right: 0;
    display: flex; flex-direction: column; align-items: center;
    gap: 8px; padding: 0 10%; pointer-events: none;
    transition: opacity .3s;
  }
  #lyrics-panel.hidden { opacity: 0; }
  .lyric-line {
    font-family: system-ui, 'Noto Sans TC', sans-serif;
    font-weight: 700; text-align: center;
    text-shadow: 0 2px 8px rgba(0,0,0,0.9), 0 0 20px rgba(0,0,0,0.8);
    line-height: 1.3; word-break: break-all;
    background: rgba(0,0,0,0.45); border-radius: 8px; padding: 4px 20px;
    transition: opacity .25s, transform .25s;
  }
  .lyric-line.current {
    font-size: 38px; color: #ffe566;
    opacity: 1; transform: scale(1);
  }
  .lyric-line.next {
    font-size: 26px; color: rgba(255,255,255,0.75);
    opacity: 0.85; transform: scale(0.97);
  }
  #lyrics-status {
    position: fixed; bottom: 112px; right: 24px;
    font-size: 12px; color: rgba(255,255,255,0.45); font-family: system-ui;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="overlay">
  <div class="icon">🎤</div>
  <h1>Kara<span>Queue</span></h1>
  <p>等待點歌中...</p>
</div>

<div id="player"></div>

<div id="lyrics-panel" class="hidden">
  <div class="lyric-line current" id="lyric-current"></div>
  <div class="lyric-line next" id="lyric-next"></div>
</div>
<div id="lyrics-status"></div>

<div id="now-bar">
  <div>
    <div class="label">正在播放</div>
    <div class="title" id="now-title">—</div>
  </div>
  <div class="next" id="next-title"></div>
</div>

<!-- Socket.IO loaded from actual server (not localhost) -->
<script src="__SERVER_URL__/socket.io/socket.io.js"></script>
<script>
const socket = io('__SERVER_URL__');
const _roomId = new URLSearchParams(location.search).get('room') || 'default';
socket.on('connect', () => socket.emit('join-room', { roomId: _roomId }));

let player = null, ytReady = false, playerReady = false;
let pendingVideoId = null, hasVideo = false;
let queue = [], currentIndex = -1;
let barTimer = null, loopData = null;

// ── Lyrics state ──────────────────────────────────────────────────────
let lyricsLines = [];
let lyricsEnabled = true;
let lyricsOffset = 0;
let globalOffset = 0;
let syncTimer = null;
let lyricsFound = false;

function parseLrc(lrc) {
  const lines = [];
  for (const raw of lrc.split('\n')) {
    const m = raw.match(/\[(\d+):(\d+\.\d+)\](.*)/);
    if (m) {
      const t = parseInt(m[1]) * 60 + parseFloat(m[2]);
      const text = m[3].trim();
      if (text) lines.push({ time: t, text });
    }
  }
  return lines.sort((a, b) => a.time - b.time);
}

function updateLyricsDisplay() {
  if (!lyricsFound || !lyricsEnabled || !playerReady || !player) return;
  const cur = player.getCurrentTime() - lyricsOffset - globalOffset;
  const nextIdx = lyricsLines.findIndex(l => l.time > cur);
  const curIdx = nextIdx === -1 ? lyricsLines.length - 1 : nextIdx - 1;

  const curLine = curIdx >= 0 ? lyricsLines[curIdx].text : '';
  const nxtLine = nextIdx >= 0 && nextIdx < lyricsLines.length ? lyricsLines[nextIdx].text : '';

  document.getElementById('lyric-current').textContent = curLine;
  document.getElementById('lyric-next').textContent = nxtLine;
}

function startSync() {
  stopSync();
  syncTimer = setInterval(updateLyricsDisplay, 100);
}
function stopSync() {
  if (syncTimer) { clearInterval(syncTimer); syncTimer = null; }
}

async function fetchAndShowLyrics(videoId, title) {
  lyricsFound = false;
  lyricsLines = [];
  document.getElementById('lyrics-panel').classList.add('hidden');
  document.getElementById('lyrics-status').textContent = '🔍';

  try {
    const r = await fetch(`__SERVER_URL__/api/lyrics?videoId=${encodeURIComponent(videoId)}&title=${encodeURIComponent(title)}`);
    const d = await r.json();
    if (d.found && d.lrc) {
      lyricsLines = parseLrc(d.lrc);
      lyricsFound = true;
      document.getElementById('lyrics-status').textContent = '';
      if (lyricsEnabled) {
        document.getElementById('lyrics-panel').classList.remove('hidden');
        startSync();
      }
    } else {
      document.getElementById('lyrics-status').textContent = '';
    }
  } catch (_) {
    document.getElementById('lyrics-status').textContent = '';
  }
}

function applyLyricsVisibility() {
  const panel = document.getElementById('lyrics-panel');
  if (lyricsFound && lyricsEnabled) {
    panel.classList.remove('hidden');
    startSync();
  } else {
    panel.classList.add('hidden');
    stopSync();
  }
}

// ── YouTube Player ────────────────────────────────────────────────────
window.onYouTubeIframeAPIReady = () => {
  ytReady = true;
  player = new YT.Player('player', {
    playerVars: { autoplay: 1, mute: 1, rel: 0, modestbranding: 1, iv_load_policy: 3 },
    events: {
      onReady: e => {
        playerReady = true;
        if (pendingVideoId) {
          e.target.loadVideoById(pendingVideoId);
          e.target.unMute();
          e.target.setVolume(loopData?.volume ?? 70);
          pendingVideoId = null;
          document.getElementById('overlay').classList.add('hidden');
          showBar();
        }
      },
      onStateChange: e => {
        if (e.data === YT.PlayerState.ENDED) socket.emit('video-ended');
      }
    }
  });
};
const tag = document.createElement('script');
tag.src = 'https://www.youtube.com/iframe_api';
document.head.appendChild(tag);

function loadVideo(videoId) {
  hasVideo = true;
  if (!playerReady) { pendingVideoId = videoId; return; }
  player.loadVideoById(videoId);
  player.unMute();
  player.setVolume(loopData?.volume ?? 70);
  document.getElementById('overlay').classList.add('hidden');
  showBar();
}

function showBar() {
  const bar = document.getElementById('now-bar');
  bar.classList.add('show');
  clearTimeout(barTimer);
  barTimer = setTimeout(() => bar.classList.remove('show'), 5000);
}

function updateBar() {
  if (currentIndex >= 0 && queue[currentIndex]) {
    document.getElementById('now-title').textContent = queue[currentIndex].title;
  }
  const next = queue[currentIndex + 1];
  document.getElementById('next-title').textContent = next ? `下一首：${next.title}` : '';
}

// ── Socket events ─────────────────────────────────────────────────────
socket.on('state', data => {
  queue = data.queue;
  currentIndex = data.currentIndex;
  globalOffset = data.globalLyricsOffset || 0;
  updateBar();
  const song = currentIndex >= 0 ? queue[currentIndex] : null;
  const newEnabled = song ? (song.lyricsEnabled !== false) : true;
  const newOffset = song ? (song.lyricsOffset || 0) : 0;
  if (newEnabled !== lyricsEnabled || newOffset !== lyricsOffset) {
    lyricsEnabled = newEnabled;
    lyricsOffset = newOffset;
    applyLyricsVisibility();
  }
  if (!hasVideo && currentIndex >= 0 && song) {
    loopData = { videoId: song.videoId, volume: song.volume ?? 70 };
    loadVideo(song.videoId);
  }
});

socket.on('play', data => {
  const videoId = typeof data === 'string' ? data : data.videoId;
  const volume = typeof data === 'object' ? (data.volume ?? 70) : 70;
  loopData = { videoId, volume };
  stopSync();
  lyricsFound = false;
  lyricsEnabled = true;
  lyricsOffset = 0;
  document.getElementById('lyrics-panel').classList.add('hidden');
  document.getElementById('lyric-current').textContent = '';
  document.getElementById('lyric-next').textContent = '';

  loadVideo(videoId);
  if (player) player.setVolume(volume);
  updateBar();
  showBar();

  const song = currentIndex >= 0 ? queue[currentIndex] : null;
  if (song) {
    lyricsEnabled = song.lyricsEnabled !== false;
    lyricsOffset = song.lyricsOffset || 0;
    fetchAndShowLyrics(videoId, song.title || '');
  } else {
    const title = typeof data === 'object' ? (data.title || '') : '';
    fetchAndShowLyrics(videoId, title);
  }
});

socket.on('global-lyrics-offset', val => {
  globalOffset = val;
});

socket.on('lyrics-updated', ({ videoId, lrc }) => {
  const curSong = currentIndex >= 0 ? queue[currentIndex] : null;
  if (!curSong || curSong.videoId !== videoId) return;
  stopSync();
  if (lrc) {
    lyricsLines = parseLrc(lrc);
    lyricsFound = true;
    if (lyricsEnabled) {
      document.getElementById('lyrics-panel').classList.remove('hidden');
      startSync();
    }
  } else {
    lyricsLines = [];
    lyricsFound = false;
    document.getElementById('lyrics-panel').classList.add('hidden');
    document.getElementById('lyric-current').textContent = '';
    document.getElementById('lyric-next').textContent = '';
  }
});

socket.on('loop', () => {
  if (loopData) {
    loadVideo(loopData.videoId);
    if (player) player.setVolume(loopData.volume);
  }
});

socket.on('stop', () => {
  hasVideo = false;
  stopSync();
  lyricsFound = false;
  document.getElementById('lyrics-panel').classList.add('hidden');
  if (playerReady) player.stopVideo();
  document.getElementById('overlay').classList.remove('hidden');
});

socket.on('volume', val => {
  if (player) player.setVolume(val);
});
</script>
</body>
</html>
