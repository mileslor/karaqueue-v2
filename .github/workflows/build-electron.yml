name: Build Electron TV

on:
  push:
    paths:
      - 'electron-tv/**'
    tags:
      - 'electron-v*'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        working-directory: electron-tv
        run: npm install
      - name: Build DMG
        working-directory: electron-tv
        run: npm run build:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: KaraQueueTV-mac
          path: electron-tv/dist/*.dmg

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        working-directory: electron-tv
        run: npm install
      - name: Build NSIS
        working-directory: electron-tv
        run: npm run build:win
      - name: Upload Win artifact
        uses: actions/upload-artifact@v4
        with:
          name: KaraQueueTV-win
          path: electron-tv/dist/*.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        run: sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libgbm-dev
      - name: Install npm deps
        working-directory: electron-tv
        run: npm install
      - name: Build AppImage
        working-directory: electron-tv
        run: npm run build:linux
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: KaraQueueTV-linux
          path: electron-tv/dist/*.AppImage

  release:
    if: startsWith(github.ref, 'refs/tags/electron-v')
    needs: [build-mac, build-win, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          tag_name: ${{ github.ref_name }}
